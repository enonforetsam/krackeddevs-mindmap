<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KRACKED NEWS MALAYSIA</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap');

*{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#131318;
  --panel-bg:rgba(22,22,30,.95);
  --panel-border:rgba(255,165,0,.08);
  --card-bg:rgba(255,255,255,.02);
  --card-hover:rgba(255,165,0,.04);
  --card-border:rgba(255,165,0,.06);
  --text-primary:rgba(255,255,255,.88);
  --text-secondary:rgba(255,255,255,.45);
  --text-muted:rgba(255,255,255,.2);
  --accent:#ff6a00;
  --accent2:#ff9d00;
  --cyber-blue:#00d4ff;
  --cyber-green:#00ff88;
  --cyber-red:#ff2244;
  --cyber-purple:#a855f7;
  --glow-orange:0 0 20px rgba(255,106,0,.15);
  --mono:'JetBrains Mono',monospace;
  --sans:'Inter',sans-serif;
  --grid-color:rgba(255,106,0,.06);
  --ticker-bg:rgba(22,22,30,.98);
  --hud-bg:rgba(20,20,28,.85);
  --mask-color:#131318;
}

/* ── Light Mode ── */
[data-mode="light"]{
  --bg:#f0f0f4;
  --panel-bg:rgba(255,255,255,.95);
  --panel-border:rgba(255,106,0,.12);
  --card-bg:rgba(0,0,0,.02);
  --card-hover:rgba(255,106,0,.06);
  --card-border:rgba(255,106,0,.1);
  --text-primary:rgba(0,0,0,.85);
  --text-secondary:rgba(0,0,0,.5);
  --text-muted:rgba(0,0,0,.25);
  --accent:#e05500;
  --accent2:#c44800;
  --cyber-green:#059652;
  --cyber-red:#dc2626;
  --cyber-purple:#7c3aed;
  --cyber-blue:#0284c7;
  --grid-color:rgba(255,106,0,.08);
  --ticker-bg:rgba(255,255,255,.98);
  --hud-bg:rgba(255,255,255,.9);
  --mask-color:#f0f0f4;
}

[data-mode="light"] .leaflet-control-attribution{
  background:rgba(255,255,255,.8)!important;
  color:rgba(0,0,0,.3)!important;
}
[data-mode="light"] .leaflet-control-attribution a{color:rgba(0,0,0,.4)!important}

[data-mode="light"] .state-tooltip{
  background:rgba(255,255,255,.95)!important;
  border-color:rgba(255,106,0,.3)!important;
  color:var(--accent2)!important;
  box-shadow:0 4px 16px rgba(0,0,0,.12)!important;
}

[data-mode="light"] .ticker-bar{
  background:linear-gradient(90deg,rgba(255,106,0,.04),var(--ticker-bg) 30%,var(--ticker-bg) 70%,rgba(255,106,0,.04));
}

[data-mode="light"] .ticker-item .headline{color:rgba(0,0,0,.55)}
[data-mode="light"] .ticker-sep{color:rgba(255,106,0,.12)}

[data-mode="light"] .corner-deco::before,
[data-mode="light"] .corner-deco::after{background:rgba(255,106,0,.15)}

[data-mode="light"] .news-panel::before{
  background:linear-gradient(180deg,transparent,rgba(255,106,0,.2) 30%,rgba(255,106,0,.2) 70%,transparent);
}

[data-mode="light"] .cat-politics{background:rgba(220,38,38,.06);color:#dc2626;border-color:rgba(220,38,38,.12)}
[data-mode="light"] .cat-economy{background:rgba(5,150,82,.06);color:#059652;border-color:rgba(5,150,82,.12)}
[data-mode="light"] .cat-tech{background:rgba(2,132,199,.06);color:#0284c7;border-color:rgba(2,132,199,.12)}
[data-mode="light"] .cat-sports{background:rgba(217,119,6,.06);color:#d97706;border-color:rgba(217,119,6,.12)}
[data-mode="light"] .cat-world{background:rgba(124,58,237,.06);color:#7c3aed;border-color:rgba(124,58,237,.12)}

[data-mode="light"] .skeleton{
  background:linear-gradient(90deg,rgba(0,0,0,.03) 25%,rgba(0,0,0,.06) 50%,rgba(0,0,0,.03) 75%);
  background-size:200% 100%;
}

[data-mode="light"] body::after{
  background:none;
}

body{
  background:var(--bg);
  font-family:var(--mono);
  color:var(--text-primary);
  overflow:hidden;
  height:100vh;
  -webkit-font-smoothing:antialiased;
}

/* ── Scanline overlay ── */
body::after{
  content:'';
  position:fixed;
  inset:0;
  background:repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,.03) 2px,
    rgba(0,0,0,.03) 4px
  );
  pointer-events:none;
  z-index:9999;
}

/* ── Layout ── */
.layout{display:flex;flex-direction:column;height:100vh}

/* ══════════════════════════════
   TOP TICKER BAR
   ══════════════════════════════ */
.ticker-bar{
  height:32px;
  background:linear-gradient(90deg,rgba(255,106,0,.06),var(--ticker-bg) 30%,var(--ticker-bg) 70%,rgba(255,106,0,.06));
  border-bottom:1px solid rgba(255,106,0,.1);
  display:flex;
  align-items:center;
  flex-shrink:0;
  overflow:hidden;
  position:relative;
  z-index:100;
}

.ticker-badge{
  background:var(--cyber-red);
  color:#fff;
  font-size:9px;
  font-weight:800;
  padding:3px 10px;
  letter-spacing:.1em;
  text-transform:uppercase;
  flex-shrink:0;
  display:flex;
  align-items:center;
  gap:6px;
  z-index:2;
}

.ticker-badge::after{
  content:'';
  width:6px;height:6px;
  background:#fff;
  border-radius:50%;
  animation:tickerPulse 1.5s infinite;
}

@keyframes tickerPulse{0%,100%{opacity:1}50%{opacity:.2}}

.ticker-scroll{
  flex:1;
  overflow:hidden;
  position:relative;
  height:100%;
  mask-image:linear-gradient(90deg,transparent,#000 40px,#000 calc(100% - 40px),transparent);
}

.ticker-track{
  display:flex;
  align-items:center;
  height:100%;
  gap:32px;
  animation:scroll 60s linear infinite;
  white-space:nowrap;
  width:max-content;
}

@keyframes scroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

.ticker-item{
  font-size:11px;
  color:var(--text-secondary);
  display:flex;
  align-items:center;
  gap:8px;
  flex-shrink:0;
}

.ticker-item .src{color:var(--accent);font-weight:700;text-transform:uppercase;font-size:9px;letter-spacing:.05em}
.ticker-item .headline{color:rgba(255,255,255,.6)}
.ticker-sep{color:rgba(255,165,0,.15);font-size:8px}

.ticker-stats{
  display:flex;
  align-items:center;
  gap:16px;
  padding:0 16px;
  flex-shrink:0;
  border-left:1px solid rgba(255,165,0,.08);
  height:100%;
}

.ticker-stat{
  font-size:10px;
  color:var(--text-muted);
  display:flex;
  align-items:center;
  gap:5px;
}

.ticker-stat .val{color:var(--cyber-green);font-weight:700}
.ticker-stat .val.red{color:var(--cyber-red)}

/* ══════════════════════════════
   NAV BAR
   ══════════════════════════════ */
.nav-bar{
  height:44px;
  background:var(--panel-bg);
  border-bottom:1px solid var(--panel-border);
  display:flex;
  align-items:center;
  padding:0 12px;
  gap:4px;
  flex-shrink:0;
  z-index:100;
}

.nav-brand{
  font-size:13px;
  font-weight:800;
  color:var(--accent);
  letter-spacing:-.02em;
  padding:0 12px 0 4px;
  border-right:1px solid var(--panel-border);
  margin-right:8px;
  display:flex;
  align-items:center;
  gap:8px;
  font-family:var(--mono);
}

.nav-brand .dot{
  width:7px;height:7px;
  background:var(--cyber-green);
  border-radius:50%;
  box-shadow:0 0 8px rgba(0,255,136,.4);
}

.nav-tab{
  font-size:11px;
  font-weight:600;
  padding:6px 14px;
  border-radius:4px;
  border:1px solid transparent;
  background:none;
  color:var(--text-muted);
  cursor:pointer;
  transition:all .15s;
  font-family:var(--mono);
  text-transform:uppercase;
  letter-spacing:.04em;
}

.nav-tab:hover{color:var(--text-secondary);background:rgba(255,255,255,.03)}
.nav-tab.active{color:var(--accent);border-color:rgba(255,106,0,.2);background:rgba(255,106,0,.05)}

.nav-tab.live{
  color:var(--cyber-red);
  display:flex;
  align-items:center;
  gap:6px;
}

.nav-tab.live::before{
  content:'';
  width:6px;height:6px;
  background:var(--cyber-red);
  border-radius:50%;
  animation:tickerPulse 1.5s infinite;
}

.nav-spacer{flex:1}

.nav-search{
  position:relative;
  width:220px;
}

.nav-search input{
  width:100%;
  padding:6px 10px 6px 30px;
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.06);
  border-radius:4px;
  color:var(--text-primary);
  font-size:11px;
  font-family:var(--mono);
  outline:none;
  transition:border-color .2s;
}

.nav-search input::placeholder{color:var(--text-muted)}
.nav-search input:focus{border-color:rgba(255,106,0,.3)}

.nav-search svg{
  position:absolute;
  left:9px;
  top:50%;
  transform:translateY(-50%);
  color:var(--text-muted);
  width:13px;height:13px;
}

/* ══════════════════════════════
   MAIN CONTENT
   ══════════════════════════════ */
.main{
  flex:1;
  display:flex;
  position:relative;
  overflow:hidden;
}

/* ── Map ── */
#map{
  flex:1;
  position:relative;
  z-index:0;
}

/* Grid overlay on map */
.map-grid{
  position:absolute;
  inset:0;
  z-index:450;
  pointer-events:none;
  background-image:
    linear-gradient(var(--grid-color) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
  background-size:60px 60px;
  mask-image:radial-gradient(ellipse at 50% 50%, #000 30%, transparent 75%);
  -webkit-mask-image:radial-gradient(ellipse at 50% 50%, #000 30%, transparent 75%);
}

/* Mode toggle */
.mode-toggle{
  width:32px;height:32px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  border-radius:4px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:all .2s;
  color:var(--text-muted);
  margin-left:8px;
  flex-shrink:0;
}

.mode-toggle:hover{
  background:rgba(255,106,0,.08);
  border-color:rgba(255,106,0,.2);
  color:var(--accent);
}

.mode-toggle svg{width:15px;height:15px}

.leaflet-control-zoom{display:none}
.leaflet-control-attribution{
  background:var(--hud-bg)!important;
  color:var(--text-muted)!important;
  font-size:8px!important;
  font-family:var(--mono)!important;
}
.leaflet-control-attribution a{color:rgba(255,165,0,.25)!important}

.state-tooltip{
  background:rgba(12,12,18,.95)!important;
  border:1px solid rgba(255,106,0,.3)!important;
  color:var(--accent2)!important;
  font-family:var(--mono)!important;
  font-size:11px!important;
  font-weight:600!important;
  padding:5px 12px!important;
  border-radius:3px!important;
  box-shadow:0 0 20px rgba(255,106,0,.1),0 4px 12px rgba(0,0,0,.5)!important;
  text-transform:uppercase!important;
  letter-spacing:.05em!important;
}
.state-tooltip::before{display:none!important}

/* ── Map HUD overlays ── */
.map-hud{
  position:absolute;
  z-index:1000;
  pointer-events:none;
}

.map-hud-tl{top:16px;left:16px}
.map-hud-br{bottom:16px;right:16px}
.map-hud-bl{bottom:16px;left:16px}

.hud-box{
  background:var(--hud-bg);
  backdrop-filter:blur(8px);
  border:1px solid rgba(255,106,0,.1);
  border-radius:4px;
  padding:10px 14px;
  pointer-events:auto;
}

.hud-label{
  font-size:9px;
  color:var(--text-muted);
  text-transform:uppercase;
  letter-spacing:.1em;
  margin-bottom:4px;
}

.hud-value{
  font-size:14px;
  font-weight:700;
  color:var(--accent);
}

.hud-coords{
  font-size:10px;
  color:var(--text-muted);
  display:flex;
  gap:12px;
  margin-top:2px;
}

.hud-grid{
  display:flex;
  gap:16px;
}

.hud-grid .hud-box{display:flex;flex-direction:column;align-items:center}

/* Corner decorations */
.corner-deco{
  position:absolute;
  width:20px;height:20px;
  z-index:1000;
  pointer-events:none;
}

.corner-deco::before,.corner-deco::after{
  content:'';
  position:absolute;
  background:rgba(255,106,0,.2);
}

.corner-deco.tl{top:8px;left:8px}
.corner-deco.tl::before{top:0;left:0;width:20px;height:1px}
.corner-deco.tl::after{top:0;left:0;width:1px;height:20px}

.corner-deco.tr{top:8px;right:8px}
.corner-deco.tr::before{top:0;right:0;width:20px;height:1px}
.corner-deco.tr::after{top:0;right:0;width:1px;height:20px}

.corner-deco.bl{bottom:8px;left:8px}
.corner-deco.bl::before{bottom:0;left:0;width:20px;height:1px}
.corner-deco.bl::after{bottom:0;left:0;width:1px;height:20px}

.corner-deco.br{bottom:8px;right:8px}
.corner-deco.br::before{bottom:0;right:0;width:20px;height:1px}
.corner-deco.br::after{bottom:0;right:0;width:1px;height:20px}

/* Theme picker */
.theme-picker{
  position:absolute;
  top:16px;
  right:16px;
  z-index:1000;
  display:flex;
  gap:4px;
  padding:4px;
  background:var(--hud-bg);
  border:1px solid rgba(255,106,0,.1);
  border-radius:4px;
  backdrop-filter:blur(8px);
}

.theme-btn{
  width:24px;height:24px;
  border-radius:3px;
  border:1.5px solid transparent;
  cursor:pointer;
  transition:all .15s;
}

.theme-btn:hover{transform:scale(1.1)}
.theme-btn.active{border-color:var(--accent)}

.theme-btn[data-theme="dark"]{background:linear-gradient(135deg,#1a1a2e,#16213e)}
.theme-btn[data-theme="satellite"]{background:linear-gradient(135deg,#2d5016,#1a3a0a)}
.theme-btn[data-theme="midnight"]{background:linear-gradient(135deg,#0f0f1a,#1a0a2d)}
.theme-btn[data-theme="topo"]{background:linear-gradient(135deg,#2a4858,#1a3040)}

/* ══════════════════════════════
   NEWS PANEL (right sidebar)
   ══════════════════════════════ */
.news-panel{
  width:400px;
  background:var(--panel-bg);
  border-left:1px solid var(--panel-border);
  display:flex;
  flex-direction:column;
  flex-shrink:0;
  position:relative;
}

/* Glow line on left edge */
.news-panel::before{
  content:'';
  position:absolute;
  top:0;bottom:0;left:-1px;
  width:1px;
  background:linear-gradient(180deg,transparent,rgba(255,106,0,.3) 30%,rgba(255,106,0,.3) 70%,transparent);
  z-index:2;
}

.panel-header{
  padding:16px 16px 0;
  flex-shrink:0;
}

.panel-title-row{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:14px;
}

.panel-title{
  font-size:11px;
  font-weight:800;
  text-transform:uppercase;
  letter-spacing:.1em;
  color:var(--accent);
}

.panel-count{
  font-size:10px;
  color:var(--text-muted);
  margin-left:auto;
}

.panel-count span{color:var(--cyber-green);font-weight:700}

/* Tabs */
.tabs{
  display:flex;
  gap:2px;
  margin-bottom:12px;
}

.tab{
  flex:1;
  padding:7px 8px;
  font-size:10px;
  font-weight:600;
  color:var(--text-muted);
  background:none;
  border:1px solid transparent;
  border-radius:3px;
  cursor:pointer;
  transition:all .15s;
  font-family:var(--mono);
  text-transform:uppercase;
  letter-spacing:.04em;
}

.tab:hover{color:var(--text-secondary);background:rgba(255,255,255,.02)}
.tab.active{color:var(--accent);border-color:rgba(255,106,0,.15);background:rgba(255,106,0,.04)}

/* Search */
.search-wrap{
  position:relative;
  margin-bottom:4px;
}

.search-wrap svg{
  position:absolute;
  left:10px;top:50%;
  transform:translateY(-50%);
  color:var(--text-muted);
  width:13px;height:13px;
}

.search-input{
  width:100%;
  padding:8px 10px 8px 32px;
  background:rgba(255,255,255,.02);
  border:1px solid rgba(255,255,255,.05);
  border-radius:3px;
  color:var(--text-primary);
  font-size:11px;
  font-family:var(--mono);
  outline:none;
  transition:border-color .2s;
}

.search-input::placeholder{color:var(--text-muted)}
.search-input:focus{border-color:rgba(255,106,0,.3)}

/* Breaking banner */
.breaking-banner{
  margin:8px 16px;
  padding:8px 12px;
  background:rgba(255,34,68,.05);
  border:1px solid rgba(255,34,68,.12);
  border-left:2px solid var(--cyber-red);
  border-radius:3px;
  display:flex;
  align-items:center;
  gap:10px;
  flex-shrink:0;
}

.breaking-badge{
  font-size:9px;
  font-weight:800;
  color:var(--cyber-red);
  text-transform:uppercase;
  letter-spacing:.08em;
  display:flex;
  align-items:center;
  gap:5px;
  flex-shrink:0;
}

.breaking-badge::before{
  content:'';
  width:5px;height:5px;
  background:var(--cyber-red);
  border-radius:50%;
  animation:tickerPulse 1.5s infinite;
}

.breaking-text{
  font-size:11px;
  color:rgba(255,255,255,.6);
  font-weight:500;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

/* News feed */
.news-feed{
  flex:1;
  overflow-y:auto;
  padding:8px 16px 16px;
}

.news-feed::-webkit-scrollbar{width:3px}
.news-feed::-webkit-scrollbar-track{background:transparent}
.news-feed::-webkit-scrollbar-thumb{background:rgba(255,106,0,.15);border-radius:3px}

.news-item{
  padding:12px;
  border-radius:3px;
  border:1px solid transparent;
  border-left:2px solid transparent;
  cursor:pointer;
  transition:all .15s;
  margin-bottom:2px;
  text-decoration:none;
  display:block;
  color:inherit;
  position:relative;
}

.news-item:hover{
  background:var(--card-hover);
  border-color:var(--card-border);
  border-left-color:var(--accent);
}

.news-meta{
  display:flex;
  align-items:center;
  gap:8px;
  margin-bottom:6px;
}

.news-source{
  font-size:9px;
  font-weight:700;
  color:var(--accent);
  text-transform:uppercase;
  letter-spacing:.06em;
}

.news-time{
  font-size:9px;
  color:var(--text-muted);
  font-family:var(--mono);
}

.news-dot{
  width:2px;height:2px;
  background:var(--text-muted);
  border-radius:50%;
}

.news-category{
  font-size:8px;
  font-weight:700;
  padding:2px 6px;
  border-radius:2px;
  text-transform:uppercase;
  letter-spacing:.06em;
  margin-left:auto;
  font-family:var(--mono);
}

.cat-politics{background:rgba(255,34,68,.08);color:#ff6b7f;border:1px solid rgba(255,34,68,.12)}
.cat-economy{background:rgba(0,255,136,.06);color:#00ff88;border:1px solid rgba(0,255,136,.1)}
.cat-tech{background:rgba(0,212,255,.06);color:#00d4ff;border:1px solid rgba(0,212,255,.1)}
.cat-sports{background:rgba(255,157,0,.06);color:#ff9d00;border:1px solid rgba(255,157,0,.1)}
.cat-world{background:rgba(168,85,247,.06);color:#c084fc;border:1px solid rgba(168,85,247,.1)}

.news-title{
  font-size:12px;
  font-weight:600;
  line-height:1.45;
  color:var(--text-primary);
  margin-bottom:4px;
  letter-spacing:-.01em;
  font-family:var(--sans);
}

.news-desc{
  font-size:11px;
  line-height:1.5;
  color:var(--text-secondary);
  font-family:var(--sans);
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  overflow:hidden;
}

/* Loading skeletons */
.skeleton{
  background:linear-gradient(90deg,rgba(255,106,0,.02) 25%,rgba(255,106,0,.05) 50%,rgba(255,106,0,.02) 75%);
  background-size:200% 100%;
  animation:shimmer 1.5s infinite;
  border-radius:3px;
}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

.skeleton-item{padding:12px;margin-bottom:2px}
.skeleton-bar{height:10px;margin-bottom:6px;border-radius:2px}
.skeleton-bar.w60{width:60%}
.skeleton-bar.w80{width:80%}
.skeleton-bar.w100{width:100%}
.skeleton-bar.short{height:8px;width:25%;margin-bottom:10px}

/* Empty state */
.empty-state{
  text-align:center;
  padding:60px 20px;
  color:var(--text-muted);
  font-size:11px;
}

/* ── Responsive ── */
@media(max-width:900px){
  .main{flex-direction:column}
  #map{height:45vh}
  .news-panel{width:100%;border-left:none;border-top:1px solid var(--panel-border)}
  .ticker-stats{display:none}
}
</style>
</head>
<body>

<!-- ══ TICKER BAR ══ -->
<div class="layout">
<div class="ticker-bar">
  <div class="ticker-badge">BREAKING</div>
  <div class="ticker-scroll">
    <div class="ticker-track" id="ticker-track"></div>
  </div>
  <div class="ticker-stats">
    <div class="ticker-stat">ARTICLES <span class="val" id="stat-count">—</span></div>
    <div class="ticker-stat">SOURCES <span class="val" id="stat-sources">—</span></div>
    <div class="ticker-stat">UPD <span class="val" id="stat-time">—</span></div>
  </div>
</div>

<!-- ══ NAV BAR ══ -->
<div class="nav-bar">
  <div class="nav-brand"><span class="dot"></span> KRACKED NEWS MY</div>
  <button class="nav-tab active" data-tab="all">All</button>
  <button class="nav-tab" data-tab="politics">Politics</button>
  <button class="nav-tab" data-tab="economy">Economy</button>
  <button class="nav-tab" data-tab="tech">Tech</button>
  <button class="nav-tab" data-tab="sports">Sports</button>
  <button class="nav-tab live">LIVE</button>
  <div class="nav-spacer"></div>
  <div class="nav-search">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
    <input type="text" placeholder="Search headlines..." id="search-input"/>
  </div>
  <button class="mode-toggle" id="mode-toggle" title="Toggle light/dark mode">
    <svg id="mode-icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><circle cx="12" cy="12" r="5"/><path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72l1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
    <svg id="mode-icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
  </button>
</div>

<!-- ══ MAIN ══ -->
<div class="main">
  <!-- Map -->
  <div id="map">
    <!-- Grid overlay -->
    <div class="map-grid"></div>
    <!-- Corner decorations -->
    <div class="corner-deco tl"></div>
    <div class="corner-deco tr"></div>
    <div class="corner-deco bl"></div>
    <div class="corner-deco br"></div>

    <!-- HUD overlays -->
    <div class="map-hud map-hud-tl">
      <div class="hud-box">
        <div class="hud-label">Region</div>
        <div class="hud-value" id="hud-region">MALAYSIA</div>
        <div class="hud-coords">
          <span>LAT <span style="color:var(--text-secondary)">4.2105°</span></span>
          <span>LNG <span style="color:var(--text-secondary)">108.9758°</span></span>
        </div>
      </div>
    </div>

    <div class="map-hud map-hud-bl">
      <div class="hud-grid">
        <div class="hud-box">
          <div class="hud-label">Status</div>
          <div class="hud-value" style="color:var(--cyber-green);font-size:11px;display:flex;align-items:center;gap:5px">
            <span style="width:5px;height:5px;background:var(--cyber-green);border-radius:50%;box-shadow:0 0 8px rgba(0,255,136,.4);display:inline-block"></span>
            LIVE
          </div>
        </div>
        <div class="hud-box">
          <div class="hud-label">Zoom</div>
          <div class="hud-value" style="font-size:11px" id="hud-zoom">6x</div>
        </div>
      </div>
    </div>

    <!-- Theme picker -->
    <div class="theme-picker">
      <button class="theme-btn active" data-theme="dark" title="Dark"></button>
      <button class="theme-btn" data-theme="satellite" title="Satellite"></button>
      <button class="theme-btn" data-theme="midnight" title="Midnight"></button>
      <button class="theme-btn" data-theme="topo" title="Topo"></button>
    </div>
  </div>

  <!-- News Panel -->
  <aside class="news-panel">
    <div class="panel-header">
      <div class="panel-title-row">
        <div class="panel-title">// INTEL FEED</div>
        <div class="panel-count"><span id="feed-count">0</span> articles</div>
      </div>
      <div class="tabs">
        <button class="tab active" data-tab="all">ALL</button>
        <button class="tab" data-tab="politics">POL</button>
        <button class="tab" data-tab="economy">ECON</button>
        <button class="tab" data-tab="tech">TECH</button>
        <button class="tab" data-tab="sports">SPORT</button>
      </div>
      <div class="search-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input class="search-input" type="text" placeholder="Filter feed..." id="panel-search"/>
      </div>
    </div>

    <div class="breaking-banner" id="breaking-banner" style="display:none">
      <span class="breaking-badge">ALERT</span>
      <span class="breaking-text" id="breaking-text"></span>
    </div>

    <div class="news-feed" id="news-feed">
      <div class="skeleton-item"><div class="skeleton skeleton-bar short"></div><div class="skeleton skeleton-bar w100"></div><div class="skeleton skeleton-bar w80"></div></div>
      <div class="skeleton-item"><div class="skeleton skeleton-bar short"></div><div class="skeleton skeleton-bar w100"></div><div class="skeleton skeleton-bar w60"></div></div>
      <div class="skeleton-item"><div class="skeleton skeleton-bar short"></div><div class="skeleton skeleton-bar w80"></div><div class="skeleton skeleton-bar w100"></div></div>
      <div class="skeleton-item"><div class="skeleton skeleton-bar short"></div><div class="skeleton skeleton-bar w100"></div><div class="skeleton skeleton-bar w60"></div></div>
      <div class="skeleton-item"><div class="skeleton skeleton-bar short"></div><div class="skeleton skeleton-bar w80"></div><div class="skeleton skeleton-bar w100"></div></div>
      <div class="skeleton-item"><div class="skeleton skeleton-bar short"></div><div class="skeleton skeleton-bar w100"></div><div class="skeleton skeleton-bar w80"></div></div>
    </div>
  </aside>
</div>
</div>

<script>
// ══════════════════════════════
// NEWS DATA
// ══════════════════════════════
const RSS_FEEDS = [
  { name: 'The Star', url: 'https://www.thestar.com.my/rss/News', category: 'politics' },
  { name: 'The Star', url: 'https://www.thestar.com.my/rss/Business', category: 'economy' },
  { name: 'The Star', url: 'https://www.thestar.com.my/rss/Tech', category: 'tech' },
  { name: 'The Star', url: 'https://www.thestar.com.my/rss/Sport', category: 'sports' },
  { name: 'FMT', url: 'https://www.freemalaysiatoday.com/feed/', category: 'politics' },
  { name: 'Malay Mail', url: 'https://www.malaymail.com/feed/rss/malaysia', category: 'politics' },
  { name: 'Malay Mail', url: 'https://www.malaymail.com/feed/rss/sports', category: 'sports' },
];

const RSS2JSON = 'https://api.rss2json.com/v1/api.json?rss_url=';
let allArticles = [];
let activeTab = 'all';

async function fetchFeed(feed) {
  try {
    const res = await fetch(RSS2JSON + encodeURIComponent(feed.url));
    const data = await res.json();
    if (data.status !== 'ok') return [];
    return (data.items || []).map(item => ({
      title: decodeHTML(item.title || ''),
      description: decodeHTML(item.description || '').replace(/<[^>]*>/g, '').slice(0, 200),
      link: item.link,
      pubDate: new Date(item.pubDate),
      source: feed.name,
      category: feed.category,
    }));
  } catch { return []; }
}

function decodeHTML(html) {
  const t = document.createElement('textarea');
  t.innerHTML = html;
  return t.value;
}

async function loadNews() {
  const results = await Promise.all(RSS_FEEDS.map(fetchFeed));
  allArticles = results.flat().sort((a, b) => b.pubDate - a.pubDate);

  const seen = new Set();
  allArticles = allArticles.filter(a => {
    const key = a.title.toLowerCase().replace(/[^a-z0-9]/g, '').slice(0, 40);
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });

  updateStats();
  renderNews();
  showBreaking();
  buildTicker();
}

function renderNews() {
  const feed = document.getElementById('news-feed');
  const q1 = document.getElementById('search-input').value.toLowerCase();
  const q2 = document.getElementById('panel-search').value.toLowerCase();
  const query = q1 || q2;

  let items = allArticles;
  if (activeTab !== 'all') items = items.filter(a => a.category === activeTab);
  if (query) items = items.filter(a => a.title.toLowerCase().includes(query) || a.description.toLowerCase().includes(query));

  document.getElementById('feed-count').textContent = items.length;

  if (items.length === 0) {
    feed.innerHTML = '<div class="empty-state">NO INTEL FOUND</div>';
    return;
  }

  feed.innerHTML = items.slice(0, 50).map(a => `
    <a class="news-item" href="${a.link}" target="_blank" rel="noopener">
      <div class="news-meta">
        <span class="news-source">${a.source}</span>
        <span class="news-dot"></span>
        <span class="news-time">${timeAgo(a.pubDate)}</span>
        <span class="news-category cat-${a.category}">${a.category}</span>
      </div>
      <div class="news-title">${a.title}</div>
      ${a.description ? `<div class="news-desc">${a.description}</div>` : ''}
    </a>
  `).join('');
}

function showBreaking() {
  if (!allArticles.length) return;
  const latest = allArticles[0];
  if (Date.now() - latest.pubDate.getTime() < 2 * 60 * 60 * 1000) {
    document.getElementById('breaking-banner').style.display = 'flex';
    document.getElementById('breaking-text').textContent = latest.title;
  }
}

function buildTicker() {
  const track = document.getElementById('ticker-track');
  const items = allArticles.slice(0, 20);
  const html = items.map(a =>
    `<div class="ticker-item"><span class="src">${a.source}</span><span class="headline">${a.title}</span></div><span class="ticker-sep">◆</span>`
  ).join('');
  // Duplicate for seamless loop
  track.innerHTML = html + html;
}

function updateStats() {
  const sources = new Set(allArticles.map(a => a.source));
  document.getElementById('stat-count').textContent = allArticles.length;
  document.getElementById('stat-sources').textContent = sources.size;
  document.getElementById('stat-time').textContent = new Date().toLocaleTimeString('en-MY', { hour: '2-digit', minute: '2-digit' });
}

function timeAgo(date) {
  const s = Math.floor((Date.now() - date.getTime()) / 1000);
  if (s < 60) return 'now';
  if (s < 3600) return Math.floor(s / 60) + 'm';
  if (s < 86400) return Math.floor(s / 3600) + 'h';
  return Math.floor(s / 86400) + 'd';
}

// ── Tabs (both nav and panel) ──
function setTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.nav-tab[data-tab],.tab[data-tab]').forEach(t => {
    t.classList.toggle('active', t.dataset.tab === tab);
  });
  renderNews();
}

document.querySelectorAll('.nav-tab[data-tab],.tab[data-tab]').forEach(t => {
  t.addEventListener('click', () => setTab(t.dataset.tab));
});

document.getElementById('search-input').addEventListener('input', renderNews);
document.getElementById('panel-search').addEventListener('input', renderNews);

// ══════════════════════════════
// LEAFLET MAP
// ══════════════════════════════
const map = L.map('map', {
  center: [4.5, 109],
  zoom: 6,
  zoomControl: false,
  attributionControl: true,
  minZoom: 5,
  maxZoom: 10,
});

map.on('zoomend', () => {
  document.getElementById('hud-zoom').textContent = map.getZoom() + 'x';
});

// ── Tile Themes ──
function getMaskColor() {
  return getComputedStyle(document.documentElement).getPropertyValue('--mask-color').trim();
}

const TILE_THEMES = {
  dark: {
    dark: { url: 'https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png', sub: 'abcd' },
    light: { url: 'https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', sub: 'abcd' },
    stateFill: 'rgba(255,106,0,0.06)', stateStroke: 'rgba(255,106,0,0.3)',
    hoverFill: 'rgba(255,106,0,0.15)', hoverStroke: '#ff6a00',
    lightStateFill: 'rgba(255,106,0,0.08)', lightStateStroke: 'rgba(224,85,0,0.35)',
    lightHoverFill: 'rgba(255,106,0,0.18)', lightHoverStroke: '#e05500',
  },
  satellite: {
    dark: { url: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', sub: null },
    light: { url: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', sub: null },
    stateFill: 'rgba(255,106,0,0.05)', stateStroke: 'rgba(255,165,0,0.5)',
    hoverFill: 'rgba(255,106,0,0.15)', hoverStroke: '#ff9d00',
    lightStateFill: 'rgba(255,106,0,0.08)', lightStateStroke: 'rgba(255,165,0,0.6)',
    lightHoverFill: 'rgba(255,106,0,0.2)', lightHoverStroke: '#e05500',
  },
  midnight: {
    dark: { url: 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', sub: 'abcd' },
    light: { url: 'https://{s}.basemaps.cartocdn.com/voyager_nolabels/{z}/{x}/{y}{r}.png', sub: 'abcd' },
    stateFill: 'rgba(168,85,247,0.06)', stateStroke: 'rgba(168,85,247,0.3)',
    hoverFill: 'rgba(168,85,247,0.15)', hoverStroke: '#a855f7',
    lightStateFill: 'rgba(124,58,237,0.08)', lightStateStroke: 'rgba(124,58,237,0.35)',
    lightHoverFill: 'rgba(124,58,237,0.18)', lightHoverStroke: '#7c3aed',
  },
  topo: {
    dark: { url: 'https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', sub: 'abc' },
    light: { url: 'https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', sub: 'abc' },
    stateFill: 'rgba(255,106,0,0.05)', stateStroke: 'rgba(255,106,0,0.4)',
    hoverFill: 'rgba(255,106,0,0.15)', hoverStroke: '#ff6a00',
    lightStateFill: 'rgba(224,85,0,0.08)', lightStateStroke: 'rgba(224,85,0,0.4)',
    lightHoverFill: 'rgba(224,85,0,0.18)', lightHoverStroke: '#c44800',
  },
};

let currentTheme = 'dark';
let currentMode = 'dark';
let tileLayer = null;
let maskLayer = null;
let geojsonLayer = null;
let malaysiaGeoData = null;

function applyTileLayer(key) {
  const t = TILE_THEMES[key];
  const variant = t[currentMode];
  if (tileLayer) map.removeLayer(tileLayer);
  const opts = { attribution: '&copy; OSM', maxZoom: 19 };
  if (variant.sub) opts.subdomains = variant.sub;
  tileLayer = L.tileLayer(variant.url, opts).addTo(map);
}

applyTileLayer('dark');

// ── Mask ──
function buildMask(geojson, fillColor) {
  const outer = [[-90,-180],[-90,180],[90,180],[90,-180],[-90,-180]];
  const holes = [];
  (geojson.features || []).forEach(f => {
    const g = f.geometry;
    if (g.type === 'Polygon') {
      holes.push(g.coordinates[0].map(c => [c[1], c[0]]));
    } else if (g.type === 'MultiPolygon') {
      g.coordinates.forEach(poly => holes.push(poly[0].map(c => [c[1], c[0]])));
    }
  });
  return L.polygon([outer, ...holes], { fillColor, fillOpacity: 1, stroke: false, interactive: false });
}

function applyMask() {
  if (!malaysiaGeoData) return;
  if (maskLayer) map.removeLayer(maskLayer);
  maskLayer = buildMask(malaysiaGeoData, getMaskColor());
  maskLayer.addTo(map);
  if (geojsonLayer) geojsonLayer.bringToFront();
}

// ── GeoJSON ──
const GEOJSON_URL = 'https://raw.githubusercontent.com/dosm-malaysia/data-open/main/datasets/geodata/administrative_1_state.geojson';
const FALLBACK_URL = 'https://raw.githubusercontent.com/Skyjacker/my-states-geojson/master/malaysia.state.geojson';

function getStyles() {
  const t = TILE_THEMES[currentTheme];
  const isLight = currentMode === 'light';
  return {
    default: {
      fillColor: isLight ? t.lightStateFill : t.stateFill,
      color: isLight ? t.lightStateStroke : t.stateStroke,
      weight: 1, fillOpacity: 1,
    },
    hover: {
      fillColor: isLight ? t.lightHoverFill : t.hoverFill,
      color: isLight ? t.lightHoverStroke : t.hoverStroke,
      weight: 2, fillOpacity: 1,
    },
  };
}

function addGeoJSON(data) {
  malaysiaGeoData = data;
  const s = getStyles();
  geojsonLayer = L.geoJSON(data, {
    style: s.default,
    onEachFeature(feature, layer) {
      const name = feature.properties.name || feature.properties.Name || feature.properties.state || feature.properties.STATE || '';
      if (name) {
        layer.bindTooltip(name, { sticky: true, className: 'state-tooltip', direction: 'top', offset: [0, -8] });
      }
      layer.on('mouseover', function () {
        this.setStyle(s.hover);
        document.getElementById('hud-region').textContent = name.toUpperCase() || 'MALAYSIA';
      });
      layer.on('mouseout', function () {
        geojsonLayer.resetStyle(this);
        document.getElementById('hud-region').textContent = 'MALAYSIA';
      });
    },
  }).addTo(map);
  applyMask();
}

function refreshGeoJSONStyles() {
  if (!geojsonLayer || !malaysiaGeoData) return;
  map.removeLayer(geojsonLayer);
  addGeoJSON(malaysiaGeoData);
}

fetch(GEOJSON_URL)
  .then(r => { if (!r.ok) throw new Error(); return r.json(); })
  .then(addGeoJSON)
  .catch(() => {
    fetch(FALLBACK_URL).then(r => r.json()).then(addGeoJSON).catch(() => {});
  });

// ── Theme Switcher ──
document.querySelectorAll('.theme-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentTheme = btn.dataset.theme;
    applyTileLayer(currentTheme);
    refreshGeoJSONStyles();
  });
});

// ── Light/Dark Mode Toggle ──
document.getElementById('mode-toggle').addEventListener('click', () => {
  currentMode = currentMode === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-mode', currentMode);

  // Toggle icons
  document.getElementById('mode-icon-sun').style.display = currentMode === 'light' ? 'block' : 'none';
  document.getElementById('mode-icon-moon').style.display = currentMode === 'dark' ? 'block' : 'none';

  // Re-apply tile layer + mask + state styles for new mode
  applyTileLayer(currentTheme);
  // Small delay to let CSS vars update before reading --mask-color
  requestAnimationFrame(() => refreshGeoJSONStyles());
});

// ── Init ──
loadNews();
setInterval(loadNews, 5 * 60 * 1000);
</script>

</body>
</html>
