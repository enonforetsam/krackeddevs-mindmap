<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KrackedDevs Mind Map</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}

/* ── CSS vars ── */
:root{
  --font:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',sans-serif;
  --mono:'SF Mono','Fira Code','Courier New',monospace;
  --bg:#101014;
  --grid-c:rgba(255,255,255,.03);
  --scan-c:transparent;
  --panel-bg:rgba(20,20,26,.92);
  --panel-border:rgba(255,255,255,.06);
  --panel-glow:transparent;
  --btn-c:rgba(255,255,255,.5);
  --btn-border:rgba(255,255,255,.08);
  --btn-hover-bg:rgba(255,255,255,.05);
  --btn-hover-border:rgba(255,255,255,.15);
  --btn-hover-c:rgba(255,255,255,.85);
  --accent:#6c8aff;
  --brand-c:rgba(255,255,255,.2);
  --hud-c:rgba(255,255,255,.25);
  --hud-val:rgba(255,255,255,.55);
  --modal-bg:rgba(18,18,24,.98);
  --modal-border:rgba(255,255,255,.08);
  --modal-title:rgba(255,255,255,.9);
  --modal-label:rgba(255,255,255,.3);
  --modal-text:rgba(255,255,255,.7);
  --input-bg:rgba(255,255,255,.03);
  --input-border:rgba(255,255,255,.07);
  --input-c:rgba(255,255,255,.8);
  --input-focus-border:rgba(108,138,255,.5);
  --input-focus-bg:rgba(108,138,255,.04);
  --node-desc:rgba(255,255,255,.4);
  --node-link-border:rgba(255,255,255,.05);
  --node-hover-shadow:0 2px 16px rgba(0,0,0,.4);
  --cancel-c:rgba(255,255,255,.3);
  --cancel-border:rgba(255,255,255,.07);
  --picker-divider:rgba(255,255,255,.06);
  --tc-label:rgba(255,255,255,.25);
  --radius:8px;
}

body{background:var(--bg);font-family:var(--font);overflow:hidden;-webkit-font-smoothing:antialiased}

/* ── Canvas ── */
#canvas-wrap{
  width:100vw;height:100vh;position:relative;overflow:hidden;cursor:grab;
  background:var(--bg);
  background-image:radial-gradient(circle,var(--grid-c) 1px,transparent 1px);
  background-size:24px 24px;
  transition:background-color .3s;
}
#canvas-wrap.panning{cursor:grabbing}
#scanlines{display:none}

/* ── SVG ── */
#svg-layer{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
#svg-layer line{pointer-events:none}

/* ── Nodes ── */
.node{
  position:absolute;min-width:170px;max-width:230px;
  border-radius:10px;padding:12px 14px 11px;
  cursor:pointer;user-select:none;
  border:1.5px solid var(--panel-border);
  transition:box-shadow .2s,background .3s,border-color .3s;
  backdrop-filter:blur(8px);
}
.node:hover{box-shadow:var(--node-hover-shadow)!important;border-color:var(--btn-hover-border)}
.node .n-title{
  font-size:13px;font-weight:600;margin-bottom:4px;
  letter-spacing:-.01em;line-height:1.3;
  display:flex;align-items:center;gap:6px;
}
.node .n-dot{
  width:7px;height:7px;border-radius:50%;flex-shrink:0;
  display:inline-block;
}
.node .n-desc{font-size:11.5px;line-height:1.5;margin-bottom:5px;color:var(--node-desc)}
.node .n-link{
  font-size:10px;color:var(--accent);text-decoration:none;cursor:pointer;
  display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  font-family:var(--mono);opacity:.6;
  border-top:1px solid var(--node-link-border);
  padding-top:5px;margin-top:4px;
}
.node .n-link:hover{opacity:1}
.n-status{display:none}

/* Node actions */
.node-actions{position:absolute;top:-8px;right:-8px;display:none;gap:3px;flex-direction:row}
.node:hover .node-actions{display:flex}
.na-btn{
  width:20px;height:20px;border-radius:6px;border:1px solid var(--panel-border);
  cursor:pointer;font-size:10px;line-height:1;
  display:flex;align-items:center;justify-content:center;
  background:var(--panel-bg);color:var(--cancel-c);
  backdrop-filter:blur(8px);transition:all .15s;
}
.na-btn:hover{color:var(--btn-hover-c);border-color:var(--btn-hover-border)}
.na-del:hover{color:#f43f5e;border-color:rgba(244,63,94,.3)}
.na-add:hover{color:var(--accent);border-color:rgba(108,138,255,.3)}
.na-expand,.na-edit{color:var(--cancel-c)}

/* ── Toolbar ── */
.toolbar{
  position:absolute;top:14px;left:14px;
  display:flex;gap:4px;z-index:100;
  background:var(--panel-bg);
  border:1px solid var(--panel-border);
  border-radius:var(--radius);padding:6px 8px;
  backdrop-filter:blur(16px);
  transition:background .3s,border-color .3s;
}
.tb-btn{
  background:transparent;border:1px solid transparent;
  color:var(--btn-c);padding:6px 12px;border-radius:6px;
  cursor:pointer;font-size:11px;font-family:var(--font);
  font-weight:500;transition:all .15s;
}
.tb-btn::before{content:none}
.tb-btn:hover{background:var(--btn-hover-bg);color:var(--btn-hover-c)}
.tb-btn.flash{color:var(--accent)!important}
#conn-btn.active{background:rgba(108,138,255,.1);color:var(--accent)}

/* ── Top-right ── */
#tr-area{
  position:absolute;top:14px;right:14px;
  display:flex;flex-direction:column;align-items:flex-end;
  gap:6px;z-index:100;
}
.brand{
  font-size:10px;color:var(--brand-c);letter-spacing:.06em;
  font-weight:500;opacity:.5;
}

/* Theme toggle */
#theme-toggle{
  display:flex;align-items:center;gap:7px;
  font-size:11px;font-weight:500;
  cursor:pointer;
  background:var(--panel-bg);border:1px solid var(--panel-border);
  padding:6px 12px;border-radius:var(--radius);
  backdrop-filter:blur(16px);color:var(--btn-c);
  transition:all .15s;
}
#theme-toggle:hover{color:var(--btn-hover-c);border-color:var(--btn-hover-border)}
#theme-swatch{width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0}

/* Theme picker */
#theme-picker{
  display:none;
  background:var(--panel-bg);
  border:1px solid var(--panel-border);
  border-radius:var(--radius);
  backdrop-filter:blur(20px);
  box-shadow:0 8px 30px rgba(0,0,0,.4);
  overflow:hidden;
  transition:background .3s,border-color .3s;
}
#theme-picker.open{display:block}
.picker-inner{display:flex;gap:0}
.theme-col{display:flex;flex-direction:column;padding:10px 8px;min-width:100px}
.theme-col+.theme-col{border-left:1px solid var(--picker-divider)}
.tc-label{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--tc-label);margin-bottom:6px;padding:0 4px;font-weight:600}
.t-opt{
  display:flex;align-items:center;gap:7px;
  padding:6px 8px;border-radius:6px;cursor:pointer;
  font-size:11px;font-weight:500;
  color:var(--btn-c);border:1px solid transparent;
  transition:all .15s;white-space:nowrap;
}
.t-opt:hover{background:var(--btn-hover-bg);color:var(--btn-hover-c)}
.t-opt.active{color:var(--btn-hover-c);background:var(--btn-hover-bg);border-color:var(--btn-hover-border)}
.t-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;transition:transform .15s}
.t-opt.active .t-dot{transform:scale(1.2)}
.mono-row{border-top:1px solid var(--picker-divider);padding:6px 8px 8px}

/* ── HUD ── */
.hud{
  position:absolute;bottom:14px;right:14px;
  font-size:11px;color:var(--hud-c);
  font-family:var(--mono);text-align:right;
  background:var(--panel-bg);border:1px solid var(--panel-border);
  padding:6px 12px;border-radius:var(--radius);
  backdrop-filter:blur(16px);
  transition:background .3s,border-color .3s;
}
.hud .hud-val{color:var(--hud-val)}

/* ── Legend ── */
#legend{
  position:absolute;bottom:14px;left:14px;
  display:flex;gap:14px;align-items:center;
  font-size:10px;color:var(--hud-c);
  font-family:var(--font);font-weight:500;
  background:var(--panel-bg);border:1px solid var(--panel-border);
  padding:6px 14px;border-radius:var(--radius);
  backdrop-filter:blur(16px);
  transition:background .3s,border-color .3s;
}
.leg-item{display:flex;align-items:center;gap:6px}

/* ── Modal ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(8px)}
.modal{
  background:var(--modal-bg);border:1px solid var(--modal-border);
  border-radius:12px;padding:24px;width:340px;color:var(--modal-text);
  font-family:var(--font);box-shadow:0 16px 48px rgba(0,0,0,.5);
}
.modal h3{
  font-size:15px;font-weight:600;margin-bottom:18px;color:var(--modal-title);
  border-bottom:1px solid var(--modal-border);padding-bottom:12px;
}
.modal h3::before{content:none}
.modal label{font-size:11px;color:var(--modal-label);display:block;margin-bottom:4px;font-weight:500}
.modal input,.modal textarea,.modal select{
  width:100%;background:var(--input-bg);border:1px solid var(--input-border);
  border-radius:6px;color:var(--input-c);padding:8px 10px;font-size:13px;
  font-family:var(--font);margin-bottom:12px;outline:none;transition:all .15s;
}
.modal textarea{height:60px;resize:vertical}
.modal input:focus,.modal textarea:focus,.modal select:focus{border-color:var(--input-focus-border);background:var(--input-focus-bg)}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:6px}
.m-save{
  background:var(--accent);color:#fff;border:none;
  border-radius:6px;padding:8px 20px;cursor:pointer;font-size:12px;font-weight:600;
  font-family:var(--font);transition:opacity .15s;
}
.m-save:hover{opacity:.85}
.m-cancel{
  background:transparent;color:var(--cancel-c);
  border:1px solid var(--cancel-border);border-radius:6px;
  padding:8px 16px;cursor:pointer;font-size:12px;font-weight:500;
  font-family:var(--font);
}
.m-cancel:hover{color:var(--btn-hover-c);border-color:var(--btn-hover-border)}
.status-row{display:flex;gap:6px;margin-bottom:12px}
.s-pick{flex:1;padding:6px 0;border-radius:6px;border:1px solid var(--cancel-border);background:transparent;color:var(--cancel-c);font-size:11px;font-family:var(--font);font-weight:500;cursor:pointer;text-align:center;transition:all .15s}
.s-pick.active-todo{border-color:rgba(255,255,255,.15);color:rgba(255,255,255,.55)}
.s-pick.active-doing{border-color:rgba(245,166,35,.35);color:#f5a623}
.s-pick.active-done{border-color:rgba(34,197,94,.35);color:#22c55e}

/* ── Expand Panel ── */
#expand-panel{
  position:absolute;top:0;right:0;bottom:0;width:400px;z-index:150;
  background:var(--panel-bg);
  border-left:1px solid var(--panel-border);
  backdrop-filter:blur(20px);
  box-shadow:-4px 0 24px rgba(0,0,0,.2);
  transform:translateX(100%);
  transition:transform .28s cubic-bezier(.4,0,.2,1),background .35s,border-color .35s;
  display:flex;flex-direction:column;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  overflow:hidden;
}
#expand-panel.open{transform:translateX(0)}

/* Header */
.ep-header{
  position:relative;
  padding:24px 24px 20px 28px;
  flex-shrink:0;
}
.ep-accent{
  position:absolute;left:0;top:24px;bottom:20px;
  width:3px;border-radius:0 2px 2px 0;
}
.ep-header-top{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:14px;
}
.ep-type{
  font-size:10px;letter-spacing:.14em;text-transform:uppercase;
  color:var(--hud-c);font-family:'Courier New',monospace;font-weight:600;
}
.ep-close{
  background:none;border:none;color:var(--cancel-c);
  width:24px;height:24px;border-radius:4px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;line-height:1;transition:all .15s;
}
.ep-close:hover{color:var(--btn-hover-c);background:var(--btn-hover-bg)}
.ep-title{
  font-size:20px;font-weight:600;line-height:1.25;
  color:var(--modal-text);
  letter-spacing:-.01em;
  word-break:break-word;
}

/* Body */
.ep-body{
  flex:1;overflow-y:auto;
  padding:8px 28px 24px 28px;
}
.ep-body::-webkit-scrollbar{width:6px}
.ep-body::-webkit-scrollbar-track{background:transparent}
.ep-body::-webkit-scrollbar-thumb{background:var(--panel-border);border-radius:3px}
.ep-body::-webkit-scrollbar-thumb:hover{background:var(--btn-hover-border)}

.ep-section{padding:16px 0;border-top:1px solid var(--picker-divider)}
.ep-section:first-child{border-top:none;padding-top:8px}

.ep-label{
  font-size:11px;font-weight:600;letter-spacing:.04em;
  color:var(--hud-c);margin-bottom:10px;
  display:flex;align-items:center;gap:8px;
}
.ep-label-count{
  font-size:10px;font-weight:500;
  color:var(--cancel-c);
  background:var(--input-bg);
  padding:1px 7px;border-radius:10px;
  border:1px solid var(--input-border);
}

/* Description */
.ep-desc{
  font-size:13px;line-height:1.6;
  color:var(--modal-text);
}

/* Link */
.ep-link{
  font-size:12px;color:var(--accent);text-decoration:none;
  display:inline-flex;align-items:center;gap:6px;
  padding:6px 10px;border-radius:5px;
  background:var(--input-bg);
  border:1px solid var(--input-border);
  transition:all .15s;word-break:break-all;
}
.ep-link::before{content:'↗';font-size:11px;opacity:.7}
.ep-link:hover{background:var(--btn-hover-bg);border-color:var(--btn-hover-border)}

/* Notes */
.ep-notes-list{display:flex;flex-direction:column;gap:8px}
.ep-note{
  position:relative;
  padding:11px 13px 10px;border-radius:6px;
  background:var(--input-bg);
  border:1px solid var(--input-border);
  transition:all .15s;
}
.ep-note:hover{border-color:var(--btn-border)}
.ep-note:hover .ep-note-del{opacity:.6}
.ep-note-text{
  font-size:13px;color:var(--modal-text);
  line-height:1.55;word-break:break-word;
  margin-bottom:6px;
  white-space:pre-wrap;
}
.ep-note-meta{
  display:flex;align-items:center;gap:8px;
  font-size:10px;color:var(--hud-c);
  font-family:'Courier New',monospace;letter-spacing:.02em;
}
.ep-note-meta::before{
  content:'';width:3px;height:3px;border-radius:50%;
  background:var(--hud-c);opacity:.5;
}
.ep-note-del{
  position:absolute;top:8px;right:8px;
  background:none;border:none;color:var(--cancel-c);cursor:pointer;
  font-size:14px;padding:2px 6px;line-height:1;border-radius:3px;
  opacity:0;transition:all .15s;
}
.ep-note-del:hover{opacity:1!important;background:rgba(255,68,85,.1);color:#ff4455}

.ep-empty{
  font-size:12px;color:var(--hud-c);
  padding:14px;text-align:center;
  border:1px dashed var(--input-border);border-radius:6px;
}

.ep-add-row{display:flex;gap:6px;margin-top:10px}
.ep-add-input{
  flex:1;background:var(--input-bg);border:1px solid var(--input-border);
  border-radius:5px;color:var(--input-c);padding:8px 11px;
  font-size:13px;font-family:inherit;outline:none;
  transition:border-color .15s,background .15s;
}
.ep-add-input:focus{border-color:var(--input-focus-border);background:var(--input-focus-bg)}
.ep-add-input::placeholder{color:var(--hud-c)}
.ep-add-btn{
  background:var(--btn-hover-bg);color:var(--accent);
  border:1px solid var(--btn-hover-border);border-radius:5px;
  padding:0 14px;cursor:pointer;font-size:12px;font-weight:500;
  font-family:inherit;transition:all .15s;flex-shrink:0;
}
.ep-add-btn:hover{opacity:.85}

/* Connections */
.ep-conn{
  display:flex;align-items:center;gap:10px;
  padding:8px 10px;border-radius:5px;cursor:pointer;
  font-size:13px;color:var(--modal-text);
  transition:background .15s;
  margin:0 -10px;
}
.ep-conn:hover{background:var(--btn-hover-bg)}
.ep-conn-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;box-shadow:0 0 6px currentColor}
.ep-conn-arrow{font-size:11px;color:var(--hud-c);font-family:'Courier New',monospace}
.ep-conn-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ep-conn-label{
  font-size:10px;color:var(--hud-c);
  font-family:'Courier New',monospace;letter-spacing:.04em;text-transform:uppercase;
  background:var(--input-bg);padding:2px 7px;border-radius:10px;
  border:1px solid var(--input-border);
}

/* Footer */
.ep-footer{
  padding:14px 24px;border-top:1px solid var(--picker-divider);
  display:flex;gap:8px;flex-shrink:0;
  background:var(--panel-bg);
}
.ep-fbtn{
  flex:1;background:transparent;border:1px solid var(--btn-border);
  color:var(--btn-c);padding:9px 0;border-radius:5px;cursor:pointer;
  font-size:12px;font-family:inherit;font-weight:500;
  transition:all .15s;text-align:center;
}
.ep-fbtn:hover{background:var(--btn-hover-bg);color:var(--btn-hover-c);border-color:var(--btn-hover-border)}

/* Expand button in node actions */
.na-expand{background:#0e0e1a;color:#6a7a8a;border:1px solid rgba(255,255,255,.1)}

/* ── View Tabs ── */
#view-tabs{
  position:fixed;top:14px;left:50%;transform:translateX(-50%);
  z-index:999;display:flex;gap:2px;
  background:var(--panel-bg);
  border:1px solid var(--panel-border);
  border-radius:var(--radius);padding:4px;
  backdrop-filter:blur(20px);
  box-shadow:0 2px 12px rgba(0,0,0,.2);
  transition:background .3s,border-color .3s;
}
.view-tab{
  background:transparent;border:none;
  color:var(--btn-c);padding:7px 18px;border-radius:6px;
  cursor:pointer;font-size:12px;font-family:var(--font);
  font-weight:500;transition:all .15s;
}
.view-tab:hover{color:var(--btn-hover-c);background:var(--btn-hover-bg)}
.view-tab.active{
  background:var(--btn-hover-bg);color:var(--accent);
}

/* ── Team View (free canvas, like mind map) ── */
#team-view{
  position:absolute;inset:0;z-index:40;
  background:var(--bg);
  background-image:
    linear-gradient(var(--grid-c) 1px,transparent 1px),
    linear-gradient(90deg,var(--grid-c) 1px,transparent 1px);
  background-size:52px 52px;
  display:none;
  transition:background-color .35s;
  overflow:hidden;
}
#team-view.active{display:block}

#team-canvas-wrap{
  position:absolute;inset:0;
  cursor:grab;overflow:hidden;
}
#team-canvas-wrap.panning{cursor:grabbing}
#team-canvas{
  position:absolute;top:0;left:0;
  width:1px;height:1px;
  transform-origin:0 0;
  will-change:transform;
}

/* Team/Project topbar */
.team-topbar{
  position:absolute;top:14px;left:14px;z-index:60;
  display:flex;gap:4px;
  background:var(--panel-bg);
  border:1px solid var(--panel-border);
  border-radius:var(--radius);padding:6px 8px;
  backdrop-filter:blur(16px);
}

.team-header-chip{
  position:absolute;top:62px;left:50%;transform:translateX(-50%);
  z-index:60;
  background:var(--panel-bg);border:1px solid var(--panel-border);
  border-radius:var(--radius);padding:7px 16px;
  backdrop-filter:blur(16px);
  font-size:12px;color:var(--hud-c);
  display:flex;align-items:center;gap:8px;
}
.team-header-chip strong{color:var(--modal-text);font-weight:600}
.team-header-chip .team-count{color:var(--accent);font-weight:700}

.team-filters-bar{
  position:absolute;top:62px;left:14px;z-index:60;
  display:flex;flex-direction:column;gap:4px;
}
.team-filter{
  display:flex;gap:3px;
  background:var(--panel-bg);border:1px solid var(--panel-border);
  border-radius:var(--radius);padding:4px;
  backdrop-filter:blur(16px);
}
.tf-btn{
  background:transparent;border:none;color:var(--btn-c);
  padding:5px 10px;border-radius:6px;cursor:pointer;
  font-size:10px;font-family:var(--font);
  font-weight:500;transition:all .15s;
}
.tf-btn:hover{color:var(--btn-hover-c);background:var(--btn-hover-bg)}
.tf-btn.active{background:rgba(108,138,255,.1);color:var(--accent)}

/* Team cards */
.team-card{
  position:absolute;
  width:270px;
  background:var(--panel-bg);
  border:1.5px solid var(--panel-border);
  border-radius:10px;padding:16px;
  font-family:var(--font);
  transition:box-shadow .2s,border-color .2s,opacity .2s;
  backdrop-filter:blur(8px);
  cursor:grab;user-select:none;
}
.team-card:active{cursor:grabbing}
.team-card:hover{
  border-color:var(--btn-hover-border);
  box-shadow:0 2px 16px rgba(0,0,0,.25);
  z-index:5;
}
.team-card:hover .tc-actions{opacity:1}
.team-card.dragging{opacity:.7;cursor:grabbing;z-index:30}
.team-card.hidden{display:none}

.tc-actions{
  position:absolute;top:10px;right:10px;
  display:flex;gap:4px;opacity:0;transition:opacity .15s;
}
.tc-action{
  background:var(--input-bg);border:1px solid var(--input-border);
  color:var(--cancel-c);width:22px;height:22px;
  border-radius:3px;cursor:pointer;font-size:11px;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;
}
.tc-action:hover{color:var(--btn-hover-c);border-color:var(--btn-hover-border)}
.tc-action.del:hover{color:#ff4455;border-color:rgba(255,68,85,.4)}

.tc-top{display:flex;gap:13px;align-items:flex-start;margin-bottom:14px}
.tc-avatar{
  position:relative;
  width:46px;height:46px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:15px;font-weight:600;letter-spacing:.02em;
  color:#fff;flex-shrink:0;
  border:2px solid var(--panel-bg);
  box-shadow:0 0 0 1px var(--accent);
}
.tc-emp-dot{
  position:absolute;bottom:-2px;right:-2px;
  width:14px;height:14px;border-radius:50%;
  border:2px solid var(--panel-bg);
  display:flex;align-items:center;justify-content:center;
  font-size:8px;font-weight:700;color:#fff;line-height:1;
}
.tc-emp-dot.fulltime  {background:#22c55e}
.tc-emp-dot.contract  {background:#f59e0b}
.tc-emp-dot.parttime  {background:#f59e0b}
.tc-emp-dot.intern    {background:#f59e0b}
.tc-emp-dot.ambassador{background:#3b82f6}
.tc-emp-dot.pending   {background:#71717a}
.tc-info{flex:1;min-width:0}
.tc-name{
  font-size:15px;font-weight:600;color:var(--modal-text);
  letter-spacing:-.01em;line-height:1.25;margin-bottom:3px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.tc-role{
  font-size:12px;color:var(--hud-c);line-height:1.35;
  display:flex;align-items:center;gap:6px;flex-wrap:wrap;
}
.tc-dept{
  font-family:var(--mono);
  font-size:9px;text-transform:uppercase;letter-spacing:.08em;
  padding:2px 7px;border-radius:10px;
  background:var(--input-bg);border:1px solid var(--input-border);
}

.tc-divider{
  height:1px;background:var(--picker-divider);
  margin:0 -18px 12px;
}

.tc-contact{
  display:flex;flex-direction:column;gap:6px;
}
.tc-contact-row{
  display:flex;align-items:center;gap:8px;
  font-size:12px;color:var(--modal-text);
  text-decoration:none;
  transition:color .15s;
}
.tc-contact-row:hover{color:var(--accent)}
.tc-contact-icon{
  width:14px;height:14px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  color:var(--hud-c);font-size:11px;
}
.tc-contact-text{
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;
  font-family:var(--mono);font-size:11px;
}

.team-empty{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  padding:40px 60px;text-align:center;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  color:var(--hud-c);
  border:1px dashed var(--panel-border);border-radius:8px;
  background:var(--panel-bg);backdrop-filter:blur(12px);
  pointer-events:none;
}
.team-empty h3{font-size:15px;color:var(--modal-text);margin-bottom:6px;font-weight:600}
.team-empty p{font-size:12px}

/* ── Sticky notes (Excalidraw-style) ── */
.sticky-note{
  position:absolute;
  width:200px;min-height:140px;
  padding:14px 14px 32px;
  border-radius:var(--radius);
  font-family:var(--font);
  font-size:13px;line-height:1.5;
  cursor:grab;user-select:none;
  box-shadow:0 2px 12px rgba(0,0,0,.15);
  transition:box-shadow .2s,opacity .2s;
}
.sticky-note:hover{
  box-shadow:0 4px 20px rgba(0,0,0,.25);
  z-index:6;
}
.sticky-note:hover .sn-actions{opacity:1}
.sticky-note:hover .sn-color-picker{opacity:1}
.sticky-note:active{cursor:grabbing}
.sticky-note.dragging{opacity:.75;z-index:30;cursor:grabbing}

.sticky-note .sn-text{
  outline:none;
  white-space:pre-wrap;word-wrap:break-word;
  min-height:80px;
  cursor:text;
}
.sticky-note .sn-text:empty::before{
  content:'Type a note...';
  opacity:.4;
}
.sticky-note .sn-actions{
  position:absolute;top:6px;right:6px;
  display:flex;gap:3px;opacity:0;transition:opacity .15s;
}
.sn-action{
  background:rgba(0,0,0,.08);border:1px solid rgba(0,0,0,.12);
  width:18px;height:18px;border-radius:2px;cursor:pointer;
  font-size:10px;line-height:1;
  display:flex;align-items:center;justify-content:center;
  color:rgba(0,0,0,.55);transition:all .15s;
}
.sn-action:hover{background:rgba(0,0,0,.15);color:#000}
.sn-action.del:hover{background:rgba(255,68,85,.2);color:#a00;border-color:rgba(255,68,85,.4)}
.sn-color-picker{
  position:absolute;bottom:8px;left:10px;
  display:flex;gap:4px;opacity:0;transition:opacity .15s;
}
.sn-c-dot{
  width:11px;height:11px;border-radius:50%;
  cursor:pointer;border:1px solid rgba(0,0,0,.25);
  transition:transform .15s;
}
.sn-c-dot:hover{transform:scale(1.2)}
.sticky-note.color-yellow{background:#fef3a8;color:#2a2410}
.sticky-note.color-pink  {background:#ffc8d4;color:#3a0a1a}
.sticky-note.color-blue  {background:#b8e0ff;color:#001a3a}
.sticky-note.color-green {background:#c4f0c4;color:#00280a}
.sticky-note.color-orange{background:#ffd7a8;color:#3a1a00}

/* HUD readout for team/projects canvas */
.team-hud{
  position:absolute;bottom:14px;right:14px;z-index:60;
  font-size:11px;color:var(--hud-c);
  font-family:var(--mono);text-align:right;
  background:var(--panel-bg);border:1px solid var(--panel-border);
  padding:6px 12px;border-radius:var(--radius);backdrop-filter:blur(16px);
}
.team-hud .hud-val{color:var(--hud-val)}

/* ── Projects View ── */
#projects-view{
  position:absolute;inset:0;z-index:40;
  background:var(--bg);
  background-image:
    linear-gradient(var(--grid-c) 1px,transparent 1px),
    linear-gradient(90deg,var(--grid-c) 1px,transparent 1px);
  background-size:52px 52px;
  display:none;
  transition:background-color .35s;
  overflow:hidden;
}
#projects-view.active{display:block}
#projects-canvas-wrap{position:absolute;inset:0;cursor:grab;overflow:hidden}
#projects-canvas-wrap.panning{cursor:grabbing}
#projects-canvas{
  position:absolute;top:0;left:0;width:1px;height:1px;
  transform-origin:0 0;will-change:transform;
}

.project-card{
  position:absolute;
  width:300px;
  background:var(--panel-bg);
  border:1.5px solid var(--panel-border);
  border-radius:10px;padding:18px 18px 14px;
  font-family:var(--font);
  transition:box-shadow .2s,border-color .2s,opacity .2s;
  backdrop-filter:blur(8px);
  cursor:grab;user-select:none;
}
.project-card:active{cursor:grabbing}
.project-card:hover{
  border-color:var(--btn-hover-border);
  box-shadow:0 2px 16px rgba(0,0,0,.25);
  z-index:5;
}
.project-card:hover .pc-actions{opacity:1}
.project-card.dragging{opacity:.7;cursor:grabbing;z-index:30}

.pc-actions{
  position:absolute;top:10px;right:10px;
  display:flex;gap:4px;opacity:0;transition:opacity .15s;
}
.pc-action{
  background:var(--input-bg);border:1px solid var(--input-border);
  color:var(--cancel-c);width:22px;height:22px;
  border-radius:3px;cursor:pointer;font-size:11px;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;
}
.pc-action:hover{color:var(--btn-hover-c);border-color:var(--btn-hover-border)}
.pc-action.del:hover{color:#ff4455;border-color:rgba(255,68,85,.4)}

.pc-header{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.pc-name{
  font-size:17px;font-weight:600;color:var(--modal-text);
  letter-spacing:-.01em;line-height:1.2;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;
}
.pc-status{
  font-family:var(--font);
  font-size:10px;font-weight:600;
  text-transform:uppercase;letter-spacing:.12em;
  padding:3px 8px;border-radius:10px;
  border:1px solid;flex-shrink:0;
}
.pc-status.live    {color:#22c55e;border-color:rgba(34,197,94,.4);background:rgba(34,197,94,.08)}
.pc-status.beta    {color:#3b82f6;border-color:rgba(59,130,246,.4);background:rgba(59,130,246,.08)}
.pc-status.building{color:#f59e0b;border-color:rgba(245,158,11,.4);background:rgba(245,158,11,.08)}
.pc-status.idea    {color:#a78bfa;border-color:rgba(167,139,250,.4);background:rgba(167,139,250,.08)}
.pc-status.paused  {color:#71717a;border-color:rgba(113,113,122,.4);background:rgba(113,113,122,.08)}

.pc-url{
  display:inline-flex;align-items:center;gap:5px;
  font-size:11px;color:var(--accent);text-decoration:none;
  margin-bottom:12px;opacity:.7;transition:opacity .15s;
  font-family:var(--mono);
}
.pc-url::before{content:'↗ ';opacity:.7}
.pc-url:hover{opacity:1}

.pc-desc{
  font-size:12.5px;line-height:1.5;color:var(--modal-text);
  margin-bottom:12px;
}

.pc-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px}
.pc-tag{
  font-size:10px;font-family:var(--font);
  font-weight:500;
  padding:2px 7px;border-radius:10px;
  background:var(--input-bg);border:1px solid var(--input-border);
  color:var(--hud-c);
}

.pc-meta{
  display:flex;justify-content:space-between;align-items:center;
  padding-top:10px;border-top:1px solid var(--picker-divider);
  font-size:11px;color:var(--hud-c);
  font-family:var(--font);
}
.pc-lead{display:flex;align-items:center;gap:5px}
.pc-lead-dot{width:6px;height:6px;border-radius:50%;background:var(--accent)}
.pc-open-hint{
  font-size:9px;color:var(--hud-c);font-family:'Courier New',monospace;
  letter-spacing:.06em;
}

/* ── Kanban Board ── */
#kanban-overlay{
  position:absolute;inset:0;z-index:180;
  background:rgba(0,0,0,.78);backdrop-filter:blur(8px);
  display:none;flex-direction:column;
}
#kanban-overlay.open{display:flex}

.kb-header{
  display:flex;align-items:center;gap:12px;
  padding:18px 24px 16px;
  border-bottom:1px solid var(--picker-divider);
  background:var(--panel-bg);
  flex-shrink:0;
  font-family:var(--font);
}
.kb-back{
  background:none;border:1px solid var(--cancel-border);color:var(--cancel-c);
  padding:6px 12px;border-radius:6px;cursor:pointer;
  font-size:12px;font-family:var(--font);font-weight:500;
  display:flex;align-items:center;gap:6px;
  transition:all .15s;flex-shrink:0;
}
.kb-back:hover{color:var(--btn-hover-c);border-color:var(--btn-hover-border)}
.kb-back::before{content:'←';font-size:13px}
.kb-accent{width:4px;height:30px;border-radius:2px;flex-shrink:0}
.kb-title-area{flex:1;min-width:0}
.kb-title{
  font-size:18px;font-weight:600;color:var(--modal-text);
  letter-spacing:-.01em;line-height:1.2;
  display:flex;align-items:center;gap:10px;
}
.kb-title-status{
  font-family:'Courier New',monospace;
  font-size:8.5px;font-weight:700;
  text-transform:uppercase;letter-spacing:.12em;
  padding:3px 8px;border-radius:10px;border:1px solid;
}
.kb-subtitle{font-size:11px;color:var(--hud-c);margin-top:2px}
.kb-close{
  background:none;border:1px solid var(--cancel-border);color:var(--cancel-c);
  width:30px;height:30px;border-radius:4px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;line-height:1;transition:all .15s;
}
.kb-close:hover{color:var(--btn-hover-c);border-color:var(--btn-hover-border)}

.kb-board{
  flex:1;display:flex;gap:14px;
  padding:20px 24px;overflow-x:auto;
  background:var(--bg);
  background-image:
    linear-gradient(var(--grid-c) 1px,transparent 1px),
    linear-gradient(90deg,var(--grid-c) 1px,transparent 1px);
  background-size:52px 52px;
}
.kb-board::-webkit-scrollbar{height:8px}
.kb-board::-webkit-scrollbar-thumb{background:var(--panel-border);border-radius:4px}

.kb-col{
  flex:0 0 280px;
  display:flex;flex-direction:column;
  background:var(--panel-bg);
  border:1.5px solid var(--panel-border);
  border-radius:10px;
  max-height:100%;
  font-family:var(--font);
  transition:border-color .15s;
}
.kb-col.drop-target{
  border-color:var(--btn-hover-border);
  background:var(--btn-hover-bg);
}
.kb-col-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 14px 10px;
  border-bottom:1px solid var(--picker-divider);
}
.kb-col-title{
  font-size:11px;font-weight:700;color:var(--modal-text);
  letter-spacing:.1em;text-transform:uppercase;
  display:flex;align-items:center;gap:8px;
}
.kb-col-count{
  font-size:10px;color:var(--hud-c);font-weight:500;
  background:var(--input-bg);border:1px solid var(--input-border);
  padding:1px 7px;border-radius:10px;
}
.kb-col-add{
  background:none;border:none;color:var(--btn-c);
  width:22px;height:22px;border-radius:3px;cursor:pointer;
  font-size:16px;line-height:1;transition:all .15s;
}
.kb-col-add:hover{color:var(--accent);background:var(--btn-hover-bg)}

.kb-col-body{
  flex:1;overflow-y:auto;
  padding:10px;
  display:flex;flex-direction:column;gap:8px;
  min-height:60px;
}
.kb-col-body::-webkit-scrollbar{width:5px}
.kb-col-body::-webkit-scrollbar-thumb{background:var(--panel-border);border-radius:3px}

.kb-card{
  background:var(--input-bg);
  border:1.5px solid var(--input-border);
  border-radius:8px;padding:12px 13px;
  font-size:13px;line-height:1.45;color:var(--modal-text);
  cursor:grab;user-select:none;
  transition:border-color .15s,box-shadow .15s,opacity .15s;
  position:relative;
}
.kb-card:hover{
  border-color:var(--btn-hover-border);
  box-shadow:0 2px 10px rgba(0,0,0,.15);
}
.kb-card:hover .kb-card-actions{opacity:1}
.kb-card:active{cursor:grabbing}
.kb-card.dragging{opacity:.4}
.kb-card.color-yellow{box-shadow:inset 3px 0 0 #f5c94f}
.kb-card.color-pink  {box-shadow:inset 3px 0 0 #ec6b9c}
.kb-card.color-blue  {box-shadow:inset 3px 0 0 #5b9bd5}
.kb-card.color-green {box-shadow:inset 3px 0 0 #22c55e}
.kb-card.color-orange{box-shadow:inset 3px 0 0 #f59e0b}
.kb-card.color-grey  {box-shadow:inset 3px 0 0 #71717a}

.kb-card-text{
  outline:none;
  white-space:pre-wrap;word-wrap:break-word;
  cursor:text;
  min-height:18px;
}
.kb-card-text:empty::before{content:'New task...';opacity:.4}

.kb-card-actions{
  position:absolute;top:6px;right:6px;
  display:flex;gap:3px;opacity:0;transition:opacity .15s;
}
.kb-card-action{
  background:rgba(0,0,0,.25);border:1px solid var(--input-border);
  color:var(--cancel-c);width:18px;height:18px;
  border-radius:2px;cursor:pointer;font-size:10px;line-height:1;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;
}
.kb-card-action:hover{color:var(--btn-hover-c)}
.kb-card-action.del:hover{color:#ff4455;border-color:rgba(255,68,85,.4)}

.kb-card-meta{
  display:flex;align-items:center;gap:6px;margin-top:6px;
  font-size:10px;color:var(--hud-c);
  font-family:var(--mono);
}
.kb-card-color-row{
  display:flex;gap:4px;margin-top:8px;opacity:0;
  transition:opacity .15s;
}
.kb-card:hover .kb-card-color-row{opacity:.8}
.kb-cc{
  width:10px;height:10px;border-radius:50%;cursor:pointer;
  border:1px solid rgba(0,0,0,.3);
  transition:transform .15s;
}
.kb-cc:hover{transform:scale(1.25)}

/* Add-column card */
.kb-add-col{
  flex:0 0 200px;
  display:flex;align-items:center;justify-content:center;
  background:transparent;
  border:2px dashed var(--panel-border);
  border-radius:var(--radius);cursor:pointer;
  font-size:13px;color:var(--hud-c);
  font-family:var(--font);font-weight:500;
  transition:all .15s;
  min-height:120px;
}
.kb-add-col:hover{
  border-color:var(--btn-hover-border);
  color:var(--accent);background:var(--btn-hover-bg);
}

/* Column header actions */
.kb-col-actions{
  display:flex;gap:3px;opacity:0;transition:opacity .15s;
}
.kb-col:hover .kb-col-actions{opacity:1}
.kb-col-act{
  background:none;border:none;color:var(--cancel-c);
  width:20px;height:20px;cursor:pointer;font-size:10px;
  display:flex;align-items:center;justify-content:center;
  border-radius:3px;transition:all .15s;
}
.kb-col-act:hover{color:var(--btn-hover-c);background:var(--btn-hover-bg)}
.kb-col-act.del:hover{color:#ff4455;background:rgba(255,68,85,.1)}
.kb-col-title-input{
  background:transparent;border:none;outline:none;
  font-size:12px;font-weight:600;color:var(--modal-text);
  font-family:var(--font);
  width:100%;padding:0;
}
</style>
</head>
<body>
<div id="view-tabs">
  <button class="view-tab active" data-view="structure" onclick="switchView('structure')">Structure</button>
  <button class="view-tab" data-view="team" onclick="switchView('team')">Team</button>
  <button class="view-tab" data-view="projects" onclick="switchView('projects')">Tech Labs</button>
</div>

<div id="canvas-wrap">
  <div id="scanlines"></div>
  <svg id="svg-layer">
    <defs>
      <marker id="arr" markerWidth="5" markerHeight="5" refX="4" refY="2.5" orient="auto">
        <path d="M0,0 L5,2.5 L0,5 Z" fill="#00e5a0" opacity=".55"/>
      </marker>
      <marker id="arr-gold" markerWidth="5" markerHeight="5" refX="4" refY="2.5" orient="auto">
        <path d="M0,0 L5,2.5 L0,5 Z" fill="#d4a017" opacity=".6"/>
      </marker>
    </defs>
  </svg>

  <div class="toolbar">
    <button class="tb-btn" onclick="addNode(null)">new node</button>
    <button class="tb-btn" id="conn-btn" onclick="toggleConnect()">connect</button>
    <button class="tb-btn" onclick="resetView()">reset</button>
    <button class="tb-btn" id="save-btn" onclick="saveView()">save view</button>
    <button class="tb-btn" onclick="exportJSON()">export</button>
    <button class="tb-btn" onclick="importJSON()">import</button>
  </div>

  <div id="tr-area">
    <div class="brand">KrackedDevs.com</div>
    <div id="theme-toggle" onclick="toggleThemePicker()">
      <span id="theme-swatch"></span>theme
    </div>
    <div id="theme-picker">
      <div class="picker-inner">
        <div class="theme-col" id="col-dark">
          <div class="tc-label">dark</div>
        </div>
        <div class="theme-col" id="col-light">
          <div class="tc-label">light</div>
        </div>
      </div>
      <div class="mono-row" id="col-mono"></div>
    </div>
  </div>

  <div class="hud"><span id="zoom-info" class="hud-val">100%</span> zoom</div>
  <div id="legend">
    <div class="leg-item">
      <svg width="22" height="8"><line x1="0" y1="4" x2="22" y2="4" stroke="#00e5a0" stroke-width="1.5" stroke-opacity=".5"/></svg>
      hierarchy
    </div>
    <div class="leg-item">
      <svg width="22" height="8"><line x1="0" y1="4" x2="22" y2="4" stroke="#d4a017" stroke-width="1.5" stroke-dasharray="5 3" stroke-opacity=".7"/></svg>
      supports
    </div>
    <span id="conn-hint" style="display:none;color:var(--accent);margin-left:6px">// click two nodes to connect</span>
  </div>
  <span id="prog-label" style="display:none"></span>
  <div id="prog-track" style="display:none"><div id="prog-fill"></div></div>

  <!-- Team view -->
  <div id="team-view">
    <div id="team-canvas-wrap">
      <div id="team-canvas"></div>
    </div>

    <div class="team-topbar">
      <button class="tb-btn" onclick="addTeamMember()">+ Person</button>

function colorOf(t){
  const p=(THEMES[currentTheme]||THEMES['dark-default']).nodes;
  return p[t]||p.default;
}

/* ── Build theme picker UI ── */
function buildThemePicker(){
  const colDark  = document.getElementById('col-dark');
  const colLight = document.getElementById('col-light');
  const colMono  = document.getElementById('col-mono');
  Object.entries(THEMES).forEach(([key,t])=>{
    const el=document.createElement('div');
    el.className='t-opt'+(key===currentTheme?' active':'');
    el.dataset.t=key;
    el.innerHTML=`<span class="t-dot" style="background:${t.accent}"></span>${t.label}`;
    el.onclick=()=>setTheme(key);
    if(t.mode==='dark')   colDark.appendChild(el);
    else if(t.mode==='light') colLight.appendChild(el);
    else colMono.appendChild(el);
  });
}

function getId(){return 'n'+Date.now()}
function toCanvas(cx,cy){const r=wrap.getBoundingClientRect();return{x:(cx-r.left-pan.x)/zoom,y:(cy-r.top-pan.y)/zoom}}
function statusClass(s){return 's-'+(s||'todo')}
function nextStatus(s){const i=STATUS_CYCLE.indexOf(s||'todo');return STATUS_CYCLE[(i+1)%STATUS_CYCLE.length]}

function cycleStatus(id,e){
  e.stopPropagation();
  const n=nodes.find(n=>n.id===id);
  n.status=nextStatus(n.status);
  const el=nodeEls[id];
  const badge=el.querySelector('.n-status');
  badge.className='n-status '+statusClass(n.status);
  badge.innerHTML=statusDot(n.status);
  el.classList.remove('s-todo','s-doing','s-done');
  el.classList.add(statusClass(n.status));
  updateProgress();
}

function statusDot(s){
  return `<span style="width:6px;height:6px;border-radius:50%;display:inline-block;background:${s==='done'?'#00e5a0':s==='doing'?'#f5a623':'#555'};${s==='done'?'box-shadow:0 0 4px #00e5a0':s==='doing'?'box-shadow:0 0 4px #f5a623':''}"></span>${STATUS_LABELS[s||'todo']}`;
}

function updateProgress(){
  const total=nodes.length, done=nodes.filter(n=>n.status==='done').length;
  const pl=document.getElementById('prog-label');
  const pf=document.getElementById('prog-fill');
  if(pl)pl.textContent=`${done} / ${total} done`;
  if(pf)pf.style.width=(total?Math.round(done/total*100):0)+'%';
}

function createNodeEl(n){
  const c=colorOf(n.type);
  const div=document.createElement('div');
  div.className='node '+statusClass(n.status);
  div.id='node-'+n.id;
  div.style.cssText=`background:${c.bg};color:${c.title};left:0;top:0;`;
  div.innerHTML=`
    <div class="node-actions">
      <button class="na-btn na-expand" title="Expand" onclick="openExpand('${n.id}',event)">⤢</button>
      <button class="na-btn na-edit" title="Edit" onclick="openEdit('${n.id}',event)">✎</button>
      <button class="na-btn na-add" title="Add child" onclick="addNode('${n.id}',event)">+</button>
      <button class="na-btn na-del" title="Delete" onclick="deleteNode('${n.id}',event)">×</button>
    </div>
    <div class="n-status ${statusClass(n.status)}" onclick="cycleStatus('${n.id}',event)">${statusDot(n.status)}</div>
    <div class="n-title" id="nt-${n.id}"><span class="n-dot" style="background:${c.border}"></span>${n.title}</div>
    <div class="n-desc" id="nd-${n.id}">${n.desc}</div>
    <a class="n-link" id="nl-${n.id}" href="${n.link}" target="_blank" style="${n.link?'':'display:none'}">${n.link}</a>
  `;
  div.addEventListener('mousedown',e=>startDrag(e,n.id));
  div.addEventListener('click',e=>nodeClick(e,n.id));
  div.addEventListener('dblclick',e=>{e.stopPropagation();openExpand(n.id,e);});
  wrap.appendChild(div);
  nodeEls[n.id]=div;
  positionNode(n);
}

function positionNode(n){
  const el=nodeEls[n.id]; if(!el)return;
  el.style.transform=`translate(${n.x*zoom+pan.x}px,${n.y*zoom+pan.y}px) scale(${zoom})`;
  el.style.transformOrigin='top left';
}

function updateAll(){nodes.forEach(n=>positionNode(n));drawEdges();}

function drawEdges(){
  while(svgEl.children.length>1)svgEl.removeChild(svgEl.lastChild);
  edges.forEach(([a,b,etype])=>{
    const na=nodes.find(n=>n.id===a),nb=nodes.find(n=>n.id===b); if(!na||!nb)return;
    const ea=nodeEls[a],eb=nodeEls[b]; if(!ea||!eb)return;
    const wa=ea.offsetWidth||160,ha=ea.offsetHeight||80;
    const wb=eb.offsetWidth||160,hb=eb.offsetHeight||80;
    const ax=(na.x+wa/2)*zoom+pan.x, ay=(na.y+ha/2)*zoom+pan.y;
    const bx=(nb.x+wb/2)*zoom+pan.x, by=(nb.y+hb/2)*zoom+pan.y;
    const isSupport=etype==='supports';
    const bothDone=na.status==='done'&&nb.status==='done';
    const col=isSupport?'#d4a017':bothDone?'#00e5a0':colorOf(na.type==='root'?nb.type:na.type).border;
    const opacity=isSupport?'0.55':bothDone?'0.7':'0.4';
    const line=document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1',ax);line.setAttribute('y1',ay);
    line.setAttribute('x2',bx);line.setAttribute('y2',by);
    line.setAttribute('stroke',col);line.setAttribute('stroke-width',bothDone?'2':'1.5');
    line.setAttribute('stroke-opacity',opacity);
    line.setAttribute('marker-end',isSupport?'url(#arr-gold)':'url(#arr)');
    if(isSupport)line.setAttribute('stroke-dasharray','6 4');
    svgEl.appendChild(line);
  });
}

function startDrag(e,id){
  if(connectMode)return; if(e.button!==0)return;
  e.stopPropagation();
  const n=nodes.find(n=>n.id===id);
  const pos=toCanvas(e.clientX,e.clientY);
  dragging=id; dragOff={x:pos.x-n.x,y:pos.y-n.y};
  document.addEventListener('mousemove',onDrag);
  document.addEventListener('mouseup',stopDrag);
}
function onDrag(e){
  if(!dragging)return;
  const n=nodes.find(n=>n.id===dragging);
  const pos=toCanvas(e.clientX,e.clientY);
  n.x=pos.x-dragOff.x; n.y=pos.y-dragOff.y;
  positionNode(n); drawEdges();
}
function stopDrag(){dragging=null;document.removeEventListener('mousemove',onDrag);document.removeEventListener('mouseup',stopDrag);}

wrap.addEventListener('mousedown',e=>{
  if(e.target!==wrap&&e.target!==svgEl)return;
  panning=true; wrap.classList.add('panning');
  panStart={x:e.clientX,y:e.clientY}; panOrigin={x:pan.x,y:pan.y};
  document.addEventListener('mousemove',onPan);
  document.addEventListener('mouseup',stopPan);
});
function onPan(e){if(!panning)return;pan.x=panOrigin.x+(e.clientX-panStart.x);pan.y=panOrigin.y+(e.clientY-panStart.y);updateAll();}
function stopPan(){panning=false;wrap.classList.remove('panning');document.removeEventListener('mousemove',onPan);document.removeEventListener('mouseup',stopPan);}

wrap.addEventListener('wheel',e=>{
  e.preventDefault();
  const r=wrap.getBoundingClientRect();
  const mx=e.clientX-r.left,my=e.clientY-r.top;
  const nz=Math.min(Math.max(zoom*(e.deltaY<0?1.1:0.9),0.3),3);
  pan.x=mx-(mx-pan.x)*(nz/zoom); pan.y=my-(my-pan.y)*(nz/zoom);
  zoom=nz;
  document.getElementById('zoom-info').textContent=Math.round(zoom*100)+'%';
  updateAll();
},{passive:false});

function setTheme(key){
  const t=THEMES[key]; if(!t)return;
  currentTheme=key;
  // Apply all CSS vars to :root
  Object.entries(t.vars).forEach(([k,v])=>document.documentElement.style.setProperty(k,v));
  // Update theme swatch button dot
  document.getElementById('theme-swatch').style.background=t.accent;
  // Re-color all nodes
  nodes.forEach(n=>{
    const c=colorOf(n.type); const el=nodeEls[n.id]; if(!el)return;
    el.style.background=c.bg; el.style.color=c.title;

  document.querySelectorAll('.t-opt').forEach(o=>o.classList.toggle('active',o.dataset.t===key));
  document.getElementById('theme-picker').classList.remove('open');
  drawEdges();
  localStorage.setItem('kd-theme',key);

function exportJSON(){
  const blob=new Blob([JSON.stringify({nodes,edges},null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='kd-mindmap.json'; a.click();
}
function importJSON(){
  const input=document.createElement('input'); input.type='file'; input.accept='.json';
  input.onchange=e=>{
    const file=e.target.files[0]; if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        Object.keys(nodeEls).forEach(id=>{wrap.removeChild(nodeEls[id]);});
        nodeEls={}; nodes=[]; edges=[];
        data.nodes.forEach(n=>{n.status=n.status||'todo';n.notes=n.notes||[];nodes.push(n);createNodeEl(n);});
        edges=data.edges||[];
        drawEdges(); updateProgress();
      }catch(err){alert('Invalid JSON file.');}
    };
    reader.readAsText(file);
  };
  input.click();
}

let expandNodeId = null;

function openExpand(id,e){
  if(e)e.stopPropagation();
  expandNodeId=id;
  const n=nodes.find(n=>n.id===id);
  if(!n.notes)n.notes=[];
  const c=colorOf(n.type);
  const panel=document.getElementById('expand-panel');
  document.getElementById('ep-title').textContent=n.title;
  document.getElementById('ep-type').textContent=n.type;
  document.getElementById('ep-accent').style.background=c.border;
  renderExpandBody(n);
  panel.classList.add('open');
}

function closeExpand(){
  document.getElementById('expand-panel').classList.remove('open');
  expandNodeId=null;
}

function renderExpandBody(n){
  const conns=edges.filter(([a,b])=>a===n.id||b===n.id).map(([a,b,t])=>{
    const otherId=a===n.id?b:a;
    const other=nodes.find(nn=>nn.id===otherId);
    if(!other)return'';
    const oc=colorOf(other.type);
    const arrow=a===n.id?'→':'←';
    const label=t==='supports'?'supports':(a===n.id?'child':'parent');
    return `<div class="ep-conn" onclick="openExpand('${other.id}')">
      <span class="ep-conn-dot" style="background:${oc.border};color:${oc.border}"></span>
      <span class="ep-conn-arrow">${arrow}</span>
      <span class="ep-conn-name">${escHtml(other.title)}</span>
      <span class="ep-conn-label">${label}</span>
    </div>`;
  }).join('');

  const notesList=n.notes&&n.notes.length?n.notes.map((note,i)=>`
    <div class="ep-note">
      <div class="ep-note-text">${escHtml(note.text)}</div>
      <div class="ep-note-meta">${escHtml(note.time||'')}</div>
      <button class="ep-note-del" onclick="deleteNote('${n.id}',${i})" title="Delete">×</button>
    </div>
  `).join(''):'<div class="ep-empty">No notes yet</div>';

  const noteCount=n.notes?n.notes.length:0;
  const connCount=edges.filter(([a,b])=>a===n.id||b===n.id).length;

  document.getElementById('ep-body').innerHTML=`
    ${n.desc?`<div class="ep-section">
      <div class="ep-label">Description</div>
      <div class="ep-desc">${escHtml(n.desc)}</div>
    </div>`:''}
    ${n.link?`<div class="ep-section">
      <div class="ep-label">Link</div>
      <a class="ep-link" href="${escHtml(n.link)}" target="_blank">${escHtml(n.link)}</a>
    </div>`:''}
    <div class="ep-section">
      <div class="ep-label">Notes${noteCount?` <span class="ep-label-count">${noteCount}</span>`:''}</div>
      <div class="ep-notes-list">${notesList}</div>
      <div class="ep-add-row">
        <input class="ep-add-input" id="ep-note-input" placeholder="Add a note…" onkeydown="if(event.key==='Enter')addNote('${n.id}')">
        <button class="ep-add-btn" onclick="addNote('${n.id}')">Add</button>
      </div>
    </div>
    ${conns?`<div class="ep-section">
      <div class="ep-label">Connections <span class="ep-label-count">${connCount}</span></div>
      ${conns}
    </div>`:''}
  `;
}

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function addNote(id){
  const input=document.getElementById('ep-note-input');
  const text=input.value.trim();
  if(!text)return;
  const n=nodes.find(n=>n.id===id);
  if(!n.notes)n.notes=[];
  const now=new Date();
  const time=now.toLocaleDateString('en-GB',{day:'numeric',month:'short'})+' '+now.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
  n.notes.push({text,time});
  renderExpandBody(n);
  setTimeout(()=>{const inp=document.getElementById('ep-note-input');if(inp)inp.focus();},50);
}

function deleteNote(id,idx){
  const n=nodes.find(n=>n.id===id);
  n.notes.splice(idx,1);
  renderExpandBody(n);
}

function editFromExpand(){
  if(!expandNodeId)return;
  closeExpand();
  openEdit(expandNodeId);
}

function addFromExpand(){
  if(!expandNodeId)return;
  const pid=expandNodeId;
  closeExpand();
  addNode(pid);
}

function initTeamCanvas(){
  const tw=document.getElementById('team-canvas-wrap');
  if(!tw)return;
  tw.addEventListener('mousedown',e=>{
    // Only pan when clicking empty canvas area
    if(e.target!==tw&&e.target.id!=='team-canvas')return;
    teamPanning=true;tw.classList.add('panning');
    teamPanStart={x:e.clientX,y:e.clientY};
    teamPanOrigin={x:teamPan.x,y:teamPan.y};
    document.addEventListener('mousemove',onTeamPan);
    document.addEventListener('mouseup',stopTeamPan);
  });
  tw.addEventListener('wheel',e=>{
    e.preventDefault();
    const r=tw.getBoundingClientRect();
    const mx=e.clientX-r.left,my=e.clientY-r.top;
    const nz=Math.min(Math.max(teamZoom*(e.deltaY<0?1.1:0.9),0.3),3);
    teamPan.x=mx-(mx-teamPan.x)*(nz/teamZoom);
    teamPan.y=my-(my-teamPan.y)*(nz/teamZoom);
    teamZoom=nz;
    updateTeamTransform();
    saveTeamCanvas();
  },{passive:false});
}

function onTeamPan(e){
  if(!teamPanning)return;
  teamPan.x=teamPanOrigin.x+(e.clientX-teamPanStart.x);
  teamPan.y=teamPanOrigin.y+(e.clientY-teamPanStart.y);
  updateTeamTransform();
}
function stopTeamPan(){

  document.getElementById('team-canvas-wrap').classList.remove('panning');

const TEAM_KEY = 'kd-team-v3';
const STICKY_KEY = 'kd-team-stickies';
const TEAM_VIEW_KEY = 'kd-team-canvas';

function loadTeam(){
  const saved=localStorage.getItem(TEAM_KEY);
  if(saved){
    try{teamMembers=JSON.parse(saved);}catch(e){teamMembers=initTeam.map(m=>({...m}));}
  }else{
    teamMembers=initTeam.map(m=>({...m}));
  }
  // Backfill missing fields
  teamMembers.forEach(m=>{if(!m.emp)m.emp='fulltime';});
  // Auto-layout any without positions
  let needsLayout=teamMembers.some(m=>m.x==null||m.y==null);
  if(needsLayout)autoLayoutPositions();

  // Stickies
  const ss=localStorage.getItem(STICKY_KEY);
  if(ss){try{teamStickies=JSON.parse(ss);}catch(e){teamStickies=[];}}

  // Canvas pan/zoom
  const cv=localStorage.getItem(TEAM_VIEW_KEY);
  if(cv){
    try{
      const s=JSON.parse(cv);
      if(s.pan)teamPan=s.pan;
      if(s.zoom)teamZoom=s.zoom;
    }catch(e){}
  }
}

function autoLayoutPositions(){
  // Lay out into 4-column grid
  const COLS=4;
  const W=300, H=200;
  const startX=40, startY=40;
  teamMembers.forEach((m,i)=>{
    const col=i%COLS;
    const row=Math.floor(i/COLS);
    m.x=startX+col*W;
    m.y=startY+row*H;
  });

function getInitials(name){
  return name.trim().split(/\s+/).slice(0,2).map(w=>w[0]||'').join('').toUpperCase()||'?';
}

function avatarColor(name){
  // Hash name to a hue
  let h=0;
  for(let i=0;i<name.length;i++)h=(h*31+name.charCodeAt(i))&0xffffffff;
  const hue=Math.abs(h)%360;
  return `hsl(${hue},50%,42%)`;
}

function renderTeam(){
  const canvas=document.getElementById('team-canvas');
  const countEl=document.getElementById('team-count');
  countEl.textContent=teamMembers.length;

  // Filter chips
  const deptChips=DEPTS.filter(d=>d.key==='all'||teamMembers.some(m=>m.dept===d.key)).map(d=>{
    const count=d.key==='all'?teamMembers.length:teamMembers.filter(m=>m.dept===d.key).length;
    return `<button class="tf-btn ${teamFilter===d.key?'active':''}" onclick="setTeamFilter('${d.key}')">${d.label} ${count}</button>`;
  }).join('');
  const empChips=[{key:'all',label:'All'}].concat(EMP_TYPES.filter(t=>teamMembers.some(m=>m.emp===t.key))).map(t=>{
    const count=t.key==='all'?teamMembers.length:teamMembers.filter(m=>m.emp===t.key).length;
    return `<button class="tf-btn ${teamEmpFilter===t.key?'active':''}" onclick="setTeamEmpFilter('${t.key}')">${t.label} ${count}</button>`;
  }).join('');
  document.getElementById('team-filter').innerHTML=deptChips;
  document.getElementById('team-emp-filter').innerHTML=empChips;

  const isVisible=m=>{
    if(teamFilter!=='all'&&m.dept!==teamFilter)return false;
    if(teamEmpFilter!=='all'&&m.emp!==teamEmpFilter)return false;
    return true;
  };

  // Cards
  const cardsHtml=teamMembers.map(m=>{
    const dept=colorOf(m.dept||'default');
    const deptLabel=(DEPTS.find(d=>d.key===m.dept)||{label:'Other'}).label;
    const empType=EMP_TYPES.find(t=>t.key===m.emp)||EMP_TYPES[0];
    const init=getInitials(m.name);
    const avBg=avatarColor(m.name);
    const contacts=[];
    if(m.email)contacts.push(`<a class="tc-contact-row" href="mailto:${escHtml(m.email)}"><span class="tc-contact-icon">✉</span><span class="tc-contact-text">${escHtml(m.email)}</span></a>`);
    if(m.twitter)contacts.push(`<a class="tc-contact-row" href="https://twitter.com/${escHtml(m.twitter.replace('@',''))}" target="_blank"><span class="tc-contact-icon">𝕏</span><span class="tc-contact-text">@${escHtml(m.twitter.replace('@',''))}</span></a>`);
    if(m.github)contacts.push(`<a class="tc-contact-row" href="https://github.com/${escHtml(m.github)}" target="_blank"><span class="tc-contact-icon">⌥</span><span class="tc-contact-text">${escHtml(m.github)}</span></a>`);
    const hidden=isVisible(m)?'':' hidden';
    return `<div class="team-card${hidden}" data-tid="${m.id}" style="left:${m.x||0}px;top:${m.y||0}px">
      <div class="tc-actions">
        <button class="tc-action" onclick="editTeamMember('${m.id}')" title="Edit">✎</button>
        <button class="tc-action del" onclick="deleteTeamMember('${m.id}')" title="Delete">×</button>
      </div>
      <div class="tc-top">
        <div class="tc-avatar" style="background:${avBg};box-shadow:0 0 0 1px ${dept.border}">
          ${init}
          <span class="tc-emp-dot ${m.emp||'fulltime'}" title="${empType.label}"></span>
        </div>
        <div class="tc-info">
          <div class="tc-name">${escHtml(m.name)}</div>
          <div class="tc-role">${escHtml(m.role||'')}<span class="tc-dept" style="color:${dept.border};border-color:${dept.border}40">${deptLabel}</span></div>
        </div>
      </div>
      ${contacts.length?`<div class="tc-divider"></div><div class="tc-contact">${contacts.join('')}</div>`:''}
    </div>`;
  }).join('');

  // Sticky notes
  const stickyHtml=teamStickies.map(s=>{
    const colors=['yellow','pink','blue','green','orange'];
    const dots=colors.map(c=>`<span class="sn-c-dot" style="background:${stickyBg(c)}" onclick="setStickyColor('${s.id}','${c}',event)"></span>`).join('');
    return `<div class="sticky-note color-${s.color||'yellow'}" data-sid="${s.id}" style="left:${s.x}px;top:${s.y}px">
      <div class="sn-actions">
        <button class="sn-action del" onclick="deleteSticky('${s.id}',event)" title="Delete">×</button>
      </div>
      <div class="sn-text" contenteditable="true" oninput="updateStickyText('${s.id}',this.innerText)" onmousedown="event.stopPropagation()">${escHtml(s.text||'')}</div>
      <div class="sn-color-picker">${dots}</div>
    </div>`;
  }).join('');

  canvas.innerHTML=cardsHtml+stickyHtml;
  updateTeamTransform();
  attachTeamItemHandlers();

  // Empty state overlay
  let empty=document.querySelector('#team-view .team-empty');
  if(empty)empty.remove();
  const visibleCount=teamMembers.filter(isVisible).length+teamStickies.length;
  if(!visibleCount){
    empty=document.createElement('div');
    empty.className='team-empty';
    empty.innerHTML='<h3>Nothing to show</h3><p>Add a person, sticky note, or clear filters.</p>';
    document.getElementById('team-view').appendChild(empty);
  }
}

function stickyBg(c){
  return {yellow:'#fef3a8',pink:'#ffc8d4',blue:'#b8e0ff',green:'#c4f0c4',orange:'#ffd7a8'}[c]||'#fef3a8';
}

function attachTeamItemHandlers(){
  document.querySelectorAll('#team-canvas .team-card').forEach(el=>{
    el.addEventListener('mousedown',e=>startTeamDrag(e,el.dataset.tid,'card',el));
  });
  document.querySelectorAll('#team-canvas .sticky-note').forEach(el=>{
    el.addEventListener('mousedown',e=>{
      if(e.target.classList.contains('sn-text')||e.target.closest('.sn-actions')||e.target.classList.contains('sn-c-dot'))return;
      startTeamDrag(e,el.dataset.sid,'sticky',el);
    });
  });
}

function startTeamDrag(e,id,kind,el){
  if(e.target.closest('.tc-action')||e.target.closest('.sn-action'))return;
  if(e.button!==0)return;
  e.stopPropagation();
  teamDragId=id;teamDragKind=kind;
  const item=kind==='card'?teamMembers.find(m=>m.id===id):teamStickies.find(s=>s.id===id);
  if(!item)return;
  const pos=teamCanvasCoords(e.clientX,e.clientY);
  teamDragOff={x:pos.x-(item.x||0),y:pos.y-(item.y||0)};
  el.classList.add('dragging');
  document.addEventListener('mousemove',onTeamItemDrag);
  document.addEventListener('mouseup',stopTeamItemDrag);
}

function onTeamItemDrag(e){
  if(!teamDragId)return;
  const item=teamDragKind==='card'?teamMembers.find(m=>m.id===teamDragId):teamStickies.find(s=>s.id===teamDragId);
  if(!item)return;
  const pos=teamCanvasCoords(e.clientX,e.clientY);
  item.x=pos.x-teamDragOff.x;
  item.y=pos.y-teamDragOff.y;
  const sel=teamDragKind==='card'?`[data-tid="${teamDragId}"]`:`[data-sid="${teamDragId}"]`;
  const el=document.querySelector('#team-canvas '+sel);
  if(el){el.style.left=item.x+'px';el.style.top=item.y+'px';}
}

function stopTeamItemDrag(){
  document.removeEventListener('mousemove',onTeamItemDrag);
  document.removeEventListener('mouseup',stopTeamItemDrag);
  if(teamDragId){
    document.querySelectorAll('#team-canvas .dragging').forEach(el=>el.classList.remove('dragging'));
    if(teamDragKind==='card')saveTeam();
    else saveStickies();
  }
  teamDragId=null;teamDragKind=null;
}

function teamCanvasCoords(cx,cy){
  const r=document.getElementById('team-canvas-wrap').getBoundingClientRect();
  return {x:(cx-r.left-teamPan.x)/teamZoom, y:(cy-r.top-teamPan.y)/teamZoom};
}

function updateTeamTransform(){
  const c=document.getElementById('team-canvas');
  c.style.transform=`translate(${teamPan.x}px,${teamPan.y}px) scale(${teamZoom})`;
  document.getElementById('team-zoom').textContent=Math.round(teamZoom*100)+'%';

function initProjectsCanvas(){
  const pw=document.getElementById('projects-canvas-wrap');
  if(!pw)return;
  pw.addEventListener('mousedown',e=>{
    if(e.target!==pw&&e.target.id!=='projects-canvas')return;
    projectsPanning=true;pw.classList.add('panning');
    projectsPanStart={x:e.clientX,y:e.clientY};
    projectsPanOrigin={x:projectsPan.x,y:projectsPan.y};
    document.addEventListener('mousemove',onProjectsPan);
    document.addEventListener('mouseup',stopProjectsPan);
  });
  pw.addEventListener('wheel',e=>{
    e.preventDefault();
    const r=pw.getBoundingClientRect();
    const mx=e.clientX-r.left,my=e.clientY-r.top;
    const nz=Math.min(Math.max(projectsZoom*(e.deltaY<0?1.1:0.9),0.3),3);
    projectsPan.x=mx-(mx-projectsPan.x)*(nz/projectsZoom);
    projectsPan.y=my-(my-projectsPan.y)*(nz/projectsZoom);
    projectsZoom=nz;
    updateProjectsTransform();
    saveProjectsCanvas();
  },{passive:false});
}
function onProjectsPan(e){
  if(!projectsPanning)return;
  projectsPan.x=projectsPanOrigin.x+(e.clientX-projectsPanStart.x);
  projectsPan.y=projectsPanOrigin.y+(e.clientY-projectsPanStart.y);
  updateProjectsTransform();
}
function stopProjectsPan(){
  projectsPanning=false;
  document.getElementById('projects-canvas-wrap').classList.remove('panning');
  document.removeEventListener('mousemove',onProjectsPan);
  document.removeEventListener('mouseup',stopProjectsPan);
  saveProjectsCanvas();
}

    <label>Description</label><textarea id="pm-desc">${escHtml(p.desc||'')}</textarea>
    <label>Tags (comma-separated)</label><input id="pm-tags" value="${escHtml((p.tags||[]).join(', '))}" placeholder="Web, AI, MVP">
    <label>Lead</label><input id="pm-lead" value="${escHtml(p.lead||'')}" placeholder="Person or team">
    <div class="modal-btns">
      <button class="m-cancel" onclick="removeModal()">Cancel</button>
      <button class="m-save" onclick="saveProject('${p.id}',${isNew},${p.x},${p.y})">Save</button>
    </div>
  </div>`;
  wrap.appendChild(bg);editModal=bg;
  setTimeout(()=>document.getElementById('pm-name').focus(),50);
}

function saveProject(id,isNew,x,y){
  const data={
    id,
    name:document.getElementById('pm-name').value.trim()||'Untitled',
    url:document.getElementById('pm-url').value.trim(),
    status:document.getElementById('pm-status').value,
    desc:document.getElementById('pm-desc').value.trim(),
    tags:document.getElementById('pm-tags').value.split(',').map(t=>t.trim()).filter(Boolean),
    lead:document.getElementById('pm-lead').value.trim(),
    x,y,
  };
  if(isNew){
    projects.push(data);
  }else{
    const idx=projects.findIndex(p=>p.id===id);
    if(idx>-1)projects[idx]={...projects[idx],...data};
  }
  saveProjects();removeModal();renderProjects();
}

/* ══════════════════════════════════════════════
   KANBAN BOARD (per project, custom columns)
══════════════════════════════════════════════ */
const KANBAN_KEY = 'kd-kanban-v2';
const DEFAULT_COLS = ['Backlog','In Progress','Review','Done'];
const KANBAN_COLORS = ['yellow','pink','blue','green','orange','grey'];
const KB_COLOR_HEX = {yellow:'#f5c94f',pink:'#ec6b9c',blue:'#5b9bd5',green:'#22c55e',orange:'#f59e0b',grey:'#71717a'};

// kanbanData[pid] = { columns: ['Backlog','In Progress',...], cards: { 'Backlog':[{id,text,color,time}], ... } }
let kanbanData = {};
let kanbanOpenPid = null;
let kbDragCardId = null;
let kbDragFromCol = null;

function loadKanban(){
  const saved=localStorage.getItem(KANBAN_KEY);
  if(saved){try{kanbanData=JSON.parse(saved);}catch(e){kanbanData={};}}
  // Migrate v1 format (flat object of arrays) to v2 (columns + cards)
  Object.keys(kanbanData).forEach(pid=>{
    const d=kanbanData[pid];
    if(!d.columns){
      // v1 format: keys are column keys with array values
      const oldCols=Object.keys(d);
      const colNames=oldCols.length?oldCols.map(k=>k.charAt(0).toUpperCase()+k.slice(1)):DEFAULT_COLS.slice();
      const cards={};
      colNames.forEach((name,i)=>{cards[name]=d[oldCols[i]]||[];});
      kanbanData[pid]={columns:colNames,cards};
    }
  });
}
function saveKanban(){localStorage.setItem(KANBAN_KEY,JSON.stringify(kanbanData));}

function ensureBoard(pid){
  if(!kanbanData[pid]){
    kanbanData[pid]={columns:DEFAULT_COLS.slice(),cards:{}};
    DEFAULT_COLS.forEach(c=>kanbanData[pid].cards[c]=[]);
  }
  const d=kanbanData[pid];
  d.columns.forEach(c=>{if(!d.cards[c])d.cards[c]=[];});
  return d;
}

function countTasks(p){
  const d=kanbanData[p.id];
  if(!d||!d.cards)return 0;
  return Object.values(d.cards).reduce((sum,arr)=>sum+arr.length,0);
}

function openKanban(pid){
  const p=projects.find(p=>p.id===pid);
  if(!p)return;
  kanbanOpenPid=pid;
  ensureBoard(pid);

  const statusLabel=(PROJECT_STATUSES.find(s=>s.key===p.status)||{label:p.status||''}).label;
  document.getElementById('kb-title-name').textContent=p.name;
  const stEl=document.getElementById('kb-title-status');
  stEl.textContent=statusLabel;
  stEl.className='kb-title-status pc-status '+(p.status||'idea');
  document.getElementById('kb-subtitle').textContent=p.url||'';
  document.getElementById('kb-accent').style.background='var(--accent)';

  renderKanbanBoard();
  document.getElementById('kanban-overlay').classList.add('open');
}

function closeKanban(){
  document.getElementById('kanban-overlay').classList.remove('open');
  kanbanOpenPid=null;
  renderProjects(); // update task counts
}

function renderKanbanBoard(){
  if(!kanbanOpenPid)return;
  const d=ensureBoard(kanbanOpenPid);
  const boardEl=document.getElementById('kb-board');

  const colsHtml=d.columns.map((colName,colIdx)=>{
    const cards=(d.cards[colName]||[]).map(c=>{
      const colorDots=KANBAN_COLORS.map(k=>`<span class="kb-cc" style="background:${KB_COLOR_HEX[k]}" onclick="setKbCardColor(${colIdx},'${c.id}','${k}',event)"></span>`).join('');
      return `<div class="kb-card color-${c.color||'yellow'}" draggable="true" data-cid="${c.id}" data-col="${colIdx}">
        <div class="kb-card-actions">
          <button class="kb-card-action del" onclick="deleteKbCard(${colIdx},'${c.id}',event)" title="Delete">×</button>
        </div>
        <div class="kb-card-text" contenteditable="true" oninput="updateKbCardText(${colIdx},'${c.id}',this.innerText)" onmousedown="event.stopPropagation()">${escHtml(c.text||'')}</div>
        ${c.time?`<div class="kb-card-meta">${escHtml(c.time)}</div>`:''}
        <div class="kb-card-color-row">${colorDots}</div>
      </div>`;
    }).join('');

    return `<div class="kb-col" data-col="${colIdx}">
      <div class="kb-col-header">
        <div class="kb-col-title">
          <input class="kb-col-title-input" value="${escHtml(colName)}" onchange="renameKbCol(${colIdx},this.value)" onkeydown="if(event.key==='Enter')this.blur()">
          <span class="kb-col-count">${(d.cards[colName]||[]).length}</span>
        </div>
        <div class="kb-col-actions">
          <button class="kb-col-act" onclick="addKbCard(${colIdx})" title="Add card">+</button>
          <button class="kb-col-act del" onclick="deleteKbCol(${colIdx})" title="Delete column">×</button>
        </div>
      </div>
      <div class="kb-col-body">${cards}</div>
    </div>`;
  }).join('');

  boardEl.innerHTML=colsHtml+`<div class="kb-add-col" onclick="addKbCol()">+ Add column</div>`;
  attachKanbanDnd();
}

function attachKanbanDnd(){
  document.querySelectorAll('.kb-card').forEach(card=>{
    card.addEventListener('dragstart',e=>{
      if(e.target.classList.contains('kb-card-text')||e.target.closest('.kb-card-actions')||e.target.classList.contains('kb-cc')){
        e.preventDefault();return;
      }
      kbDragCardId=card.dataset.cid;
      kbDragFromCol=parseInt(card.dataset.col);
      card.classList.add('dragging');
      e.dataTransfer.effectAllowed='move';
      try{e.dataTransfer.setData('text/plain',kbDragCardId);}catch(_){}
    });
    card.addEventListener('dragend',()=>{
      card.classList.remove('dragging');
      document.querySelectorAll('.kb-col').forEach(c=>c.classList.remove('drop-target'));
      kbDragCardId=null;kbDragFromCol=null;
    });
  });
  document.querySelectorAll('.kb-col').forEach(col=>{
    col.addEventListener('dragover',e=>{
      if(!kbDragCardId)return;
      e.preventDefault();e.dataTransfer.dropEffect='move';
      col.classList.add('drop-target');
    });
    col.addEventListener('dragleave',e=>{
      if(!col.contains(e.relatedTarget))col.classList.remove('drop-target');
    });
    col.addEventListener('drop',e=>{
      e.preventDefault();
      col.classList.remove('drop-target');
      if(!kbDragCardId)return;
      const toIdx=parseInt(col.dataset.col);
      moveKbCard(kbDragFromCol,toIdx,kbDragCardId);
    });
  });
}

/* Column CRUD */
function addKbCol(){
  if(!kanbanOpenPid)return;
  const d=ensureBoard(kanbanOpenPid);
  const name=prompt('New column name:');
  if(!name||!name.trim())return;
  const n=name.trim();
  if(d.columns.includes(n)){alert('Column already exists.');return;}
  d.columns.push(n);
  d.cards[n]=[];
  saveKanban();renderKanbanBoard();
}

function renameKbCol(colIdx,newName){
  if(!kanbanOpenPid)return;
  const d=ensureBoard(kanbanOpenPid);
  const oldName=d.columns[colIdx];
  const n=newName.trim();
  if(!n){renderKanbanBoard();return;} // revert if empty
  if(n===oldName)return;
  if(d.columns.includes(n)){alert('A column with that name already exists.');renderKanbanBoard();return;}
  d.columns[colIdx]=n;
  d.cards[n]=d.cards[oldName]||[];
  delete d.cards[oldName];
  saveKanban();renderKanbanBoard();
}

function deleteKbCol(colIdx){
  if(!kanbanOpenPid)return;
  const d=ensureBoard(kanbanOpenPid);
  const name=d.columns[colIdx];
  const cardCount=(d.cards[name]||[]).length;
  const msg=cardCount?`Delete "${name}" and its ${cardCount} card(s)?`:`Delete empty column "${name}"?`;
  if(!confirm(msg))return;
  d.columns.splice(colIdx,1);
  delete d.cards[name];
  saveKanban();renderKanbanBoard();
}

/* Card CRUD */
function addKbCard(colIdx){
  if(!kanbanOpenPid)return;
  const d=ensureBoard(kanbanOpenPid);
  const colName=d.columns[colIdx];
  const now=new Date();
  const time=now.toLocaleDateString('en-GB',{day:'numeric',month:'short'});
  d.cards[colName].unshift({id:'k'+Date.now(),text:'',color:'yellow',time});
  saveKanban();renderKanbanBoard();
  setTimeout(()=>{
    const first=document.querySelector(`.kb-col[data-col="${colIdx}"] .kb-card-text`);
    if(first)first.focus();
  },50);
}

function updateKbCardText(colIdx,cardId,text){
  const d=ensureBoard(kanbanOpenPid);
  const colName=d.columns[colIdx];
  const c=(d.cards[colName]||[]).find(c=>c.id===cardId);
  if(!c)return;
  c.text=text;
  saveKanban();
}

function setKbCardColor(colIdx,cardId,color,e){
  e.stopPropagation();
  const d=ensureBoard(kanbanOpenPid);
  const colName=d.columns[colIdx];
  const c=(d.cards[colName]||[]).find(c=>c.id===cardId);
  if(!c)return;
  c.color=color;
  saveKanban();
  const el=document.querySelector(`.kb-card[data-cid="${cardId}"]`);
  if(el){
    KANBAN_COLORS.forEach(k=>el.classList.remove('color-'+k));
    el.classList.add('color-'+color);
  }
}

function deleteKbCard(colIdx,cardId,e){
  e.stopPropagation();
  const d=ensureBoard(kanbanOpenPid);
  const colName=d.columns[colIdx];
  d.cards[colName]=(d.cards[colName]||[]).filter(c=>c.id!==cardId);
  saveKanban();renderKanbanBoard();
}

function moveKbCard(fromIdx,toIdx,cardId){
  if(!kanbanOpenPid||fromIdx===toIdx)return;
  const d=ensureBoard(kanbanOpenPid);
  const fromName=d.columns[fromIdx];
  const toName=d.columns[toIdx];
  const idx=(d.cards[fromName]||[]).findIndex(c=>c.id===cardId);
  if(idx===-1)return;
  const [card]=d.cards[fromName].splice(idx,1);
  d.cards[toName].unshift(card);
  saveKanban();renderKanbanBoard();
}

// Close kanban on Escape
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'&&kanbanOpenPid)closeKanban();
});

/* ── Init ── */
// Apply saved theme before creating nodes
const _t=localStorage.getItem('kd-theme');
if(_t&&THEMES[_t]){
  currentTheme=_t;
  Object.entries(THEMES[_t].vars).forEach(([k,v])=>document.documentElement.style.setProperty(k,v));
}

buildThemePicker();
initNodes.forEach(n=>{nodes.push(n);createNodeEl(n);});
initEdges.forEach(e=>edges.push(e));
loadSavedState();
loadTeam();
initTeamCanvas();
loadProjects();
initProjectsCanvas();
loadKanban();

// Restore last view mode

if(_vm==='team')switchView('team');
else if(_vm==='projects')switchView('projects');

// Sync swatch dot to current theme
document.getElementById('theme-swatch').style.background=THEMES[currentTheme].accent;

setTimeout(()=>{updateAll();updateProgress();},100);
</script>
