<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Malaysia News</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

*{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#0a0a0f;
  --panel-bg:#111118;
  --panel-border:rgba(255,255,255,.06);
  --card-bg:rgba(255,255,255,.03);
  --card-hover:rgba(255,255,255,.06);
  --card-border:rgba(255,255,255,.05);
  --text-primary:rgba(255,255,255,.9);
  --text-secondary:rgba(255,255,255,.5);
  --text-muted:rgba(255,255,255,.3);
  --accent:#3b82f6;
  --accent-glow:rgba(59,130,246,.15);
  --red:#ef4444;
  --green:#22c55e;
  --yellow:#eab308;
  --font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --radius:10px;
}

body{
  background:var(--bg);
  font-family:var(--font);
  color:var(--text-primary);
  overflow:hidden;
  height:100vh;
  -webkit-font-smoothing:antialiased;
}

/* ── Layout ── */
.layout{
  display:flex;
  height:100vh;
}

/* ── Map Section ── */
.map-section{
  flex:1;
  position:relative;
  overflow:hidden;
}

.map-section::before{
  content:'';
  position:absolute;
  inset:0;
  background:radial-gradient(ellipse at 40% 50%, rgba(59,130,246,.04) 0%, transparent 70%);
  pointer-events:none;
}

.map-header{
  position:absolute;
  top:32px;
  left:40px;
  z-index:1000;
  pointer-events:none;
}

.map-header h1{
  font-size:22px;
  font-weight:800;
  letter-spacing:-.03em;
  color:var(--text-primary);
}

.map-header h1 span{
  color:var(--accent);
}

.map-header p{
  font-size:12px;
  color:var(--text-muted);
  margin-top:4px;
  letter-spacing:.03em;
  text-transform:uppercase;
}

#map{
  width:100%;
  height:100%;
  position:absolute;
  inset:0;
  z-index:0;
}

.leaflet-control-zoom{display:none}
.leaflet-control-attribution{
  background:rgba(10,10,15,.7)!important;
  color:rgba(255,255,255,.2)!important;
  font-size:9px!important;
}
.leaflet-control-attribution a{color:rgba(255,255,255,.3)!important}

.state-tooltip{
  background:rgba(15,15,22,.92)!important;
  border:1px solid rgba(59,130,246,.3)!important;
  color:rgba(255,255,255,.85)!important;
  font-family:var(--font)!important;
  font-size:12px!important;
  font-weight:600!important;
  padding:5px 10px!important;
  border-radius:6px!important;
  box-shadow:0 4px 12px rgba(0,0,0,.4)!important;
}
.state-tooltip::before{display:none!important}
.leaflet-tooltip-top:before{border-top-color:rgba(59,130,246,.3)!important}

/* ── Theme Picker ── */
.theme-picker{
  position:absolute;
  top:32px;
  right:24px;
  z-index:1000;
  display:flex;
  gap:6px;
  background:rgba(10,10,15,.85);
  backdrop-filter:blur(8px);
  padding:6px;
  border-radius:8px;
  border:1px solid rgba(255,255,255,.06);
}

.theme-btn{
  width:28px;height:28px;
  border-radius:6px;
  border:2px solid transparent;
  cursor:pointer;
  transition:border-color .2s, transform .15s;
  position:relative;
}

.theme-btn:hover{transform:scale(1.1)}
.theme-btn.active{border-color:var(--accent)}

.theme-btn[data-theme="dark"]{background:linear-gradient(135deg,#1a1a2e,#16213e)}
.theme-btn[data-theme="satellite"]{background:linear-gradient(135deg,#2d5016,#1a3a0a)}
.theme-btn[data-theme="light"]{background:linear-gradient(135deg,#e0e0e0,#c0c0c0)}
.theme-btn[data-theme="topo"]{background:linear-gradient(135deg,#2a4858,#1a3040)}

.theme-btn::after{
  content:attr(title);
  position:absolute;
  bottom:-22px;
  left:50%;
  transform:translateX(-50%);
  font-size:9px;
  color:var(--text-muted);
  white-space:nowrap;
  opacity:0;
  transition:opacity .2s;
  pointer-events:none;
}

.theme-btn:hover::after{opacity:1}

/* Map stats bar */
.map-stats{
  position:absolute;
  bottom:32px;
  left:40px;
  right:40px;
  display:flex;
  gap:24px;
  z-index:1000;
  pointer-events:none;
}

.stat{
  display:flex;
  flex-direction:column;
  gap:2px;
}

.stat-label{
  font-size:10px;
  color:var(--text-muted);
  text-transform:uppercase;
  letter-spacing:.05em;
}

.stat-value{
  font-size:14px;
  font-weight:700;
  color:var(--text-secondary);
}

.stat-value.live{
  color:var(--red);
  display:flex;
  align-items:center;
  gap:6px;
}

.live-dot{
  width:6px;height:6px;
  background:var(--red);
  border-radius:50%;
  animation:pulse 2s infinite;
}

@keyframes pulse{
  0%,100%{opacity:1}
  50%{opacity:.3}
}

/* ── News Panel ── */
.news-panel{
  width:420px;
  background:var(--panel-bg);
  border-left:1px solid var(--panel-border);
  display:flex;
  flex-direction:column;
  height:100vh;
}

.panel-header{
  padding:24px 24px 0;
  flex-shrink:0;
}

.panel-title{
  font-size:13px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:.06em;
  color:var(--text-secondary);
  margin-bottom:16px;
}

/* ── Tabs ── */
.tabs{
  display:flex;
  gap:4px;
  background:rgba(255,255,255,.03);
  border-radius:8px;
  padding:3px;
  margin-bottom:16px;
}

.tab{
  flex:1;
  padding:8px 12px;
  font-size:12px;
  font-weight:600;
  color:var(--text-muted);
  background:none;
  border:none;
  border-radius:6px;
  cursor:pointer;
  transition:all .2s;
  font-family:var(--font);
}

.tab:hover{
  color:var(--text-secondary);
}

.tab.active{
  background:rgba(255,255,255,.07);
  color:var(--text-primary);
}

/* ── Search ── */
.search-wrap{
  position:relative;
  margin-bottom:4px;
}

.search-wrap svg{
  position:absolute;
  left:12px;
  top:50%;
  transform:translateY(-50%);
  color:var(--text-muted);
}

.search-input{
  width:100%;
  padding:10px 12px 10px 36px;
  background:rgba(255,255,255,.03);
  border:1px solid var(--card-border);
  border-radius:8px;
  color:var(--text-primary);
  font-size:13px;
  font-family:var(--font);
  outline:none;
  transition:border-color .2s;
}

.search-input::placeholder{color:var(--text-muted)}
.search-input:focus{border-color:rgba(59,130,246,.4)}

/* ── News Feed ── */
.news-feed{
  flex:1;
  overflow-y:auto;
  padding:12px 24px 24px;
}

.news-feed::-webkit-scrollbar{width:4px}
.news-feed::-webkit-scrollbar-track{background:transparent}
.news-feed::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:4px}

.news-item{
  padding:16px;
  border-radius:var(--radius);
  border:1px solid transparent;
  cursor:pointer;
  transition:all .2s;
  margin-bottom:4px;
  text-decoration:none;
  display:block;
  color:inherit;
}

.news-item:hover{
  background:var(--card-hover);
  border-color:var(--card-border);
}

.news-meta{
  display:flex;
  align-items:center;
  gap:8px;
  margin-bottom:8px;
}

.news-source{
  font-size:11px;
  font-weight:600;
  color:var(--accent);
  text-transform:uppercase;
  letter-spacing:.03em;
}

.news-time{
  font-size:11px;
  color:var(--text-muted);
}

.news-dot{
  width:3px;height:3px;
  background:var(--text-muted);
  border-radius:50%;
}

.news-category{
  font-size:10px;
  font-weight:600;
  padding:2px 7px;
  border-radius:4px;
  text-transform:uppercase;
  letter-spacing:.04em;
  margin-left:auto;
}

.cat-politics{background:rgba(239,68,68,.12);color:#f87171}
.cat-economy{background:rgba(34,197,94,.12);color:#4ade80}
.cat-tech{background:rgba(59,130,246,.12);color:#60a5fa}
.cat-sports{background:rgba(234,179,8,.12);color:#facc15}
.cat-world{background:rgba(168,85,247,.12);color:#c084fc}
.cat-crime{background:rgba(249,115,22,.12);color:#fb923c}
.cat-health{background:rgba(20,184,166,.12);color:#2dd4bf}

.news-title{
  font-size:14px;
  font-weight:600;
  line-height:1.45;
  color:var(--text-primary);
  margin-bottom:6px;
  letter-spacing:-.01em;
}

.news-desc{
  font-size:12px;
  line-height:1.55;
  color:var(--text-secondary);
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  overflow:hidden;
}

/* ── Breaking banner ── */
.breaking-banner{
  margin:0 24px 8px;
  padding:10px 14px;
  background:rgba(239,68,68,.08);
  border:1px solid rgba(239,68,68,.15);
  border-radius:8px;
  display:flex;
  align-items:center;
  gap:10px;
  flex-shrink:0;
}

.breaking-badge{
  font-size:10px;
  font-weight:800;
  color:var(--red);
  text-transform:uppercase;
  letter-spacing:.06em;
  white-space:nowrap;
  display:flex;
  align-items:center;
  gap:6px;
}

.breaking-text{
  font-size:12px;
  color:rgba(255,255,255,.7);
  font-weight:500;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

/* ── Loading ── */
.skeleton{
  background:linear-gradient(90deg,rgba(255,255,255,.03) 25%,rgba(255,255,255,.06) 50%,rgba(255,255,255,.03) 75%);
  background-size:200% 100%;
  animation:shimmer 1.5s infinite;
  border-radius:6px;
}

@keyframes shimmer{
  0%{background-position:200% 0}
  100%{background-position:-200% 0}
}

.skeleton-item{padding:16px;margin-bottom:4px}
.skeleton-bar{height:12px;margin-bottom:8px;border-radius:4px}
.skeleton-bar.w60{width:60%}
.skeleton-bar.w80{width:80%}
.skeleton-bar.w100{width:100%}
.skeleton-bar.short{height:10px;width:30%;margin-bottom:12px}

/* ── Empty state ── */
.empty-state{
  text-align:center;
  padding:60px 20px;
  color:var(--text-muted);
}

.empty-state svg{margin-bottom:12px;opacity:.3}
.empty-state p{font-size:13px}

/* ── Responsive ── */
@media(max-width:900px){
  .layout{flex-direction:column}
  .map-section{height:45vh;padding:20px}
  .news-panel{width:100%;height:55vh;border-left:none;border-top:1px solid var(--panel-border)}
  .map-header{top:16px;left:20px}
  .map-stats{bottom:16px;left:20px;right:20px}
}
</style>
</head>
<body>

<div class="layout">
  <!-- Map Section -->
  <section class="map-section">
    <div class="map-header">
      <h1>Malaysia<span>News</span></h1>
      <p>Live headlines across the nation</p>
    </div>

    <div id="map"></div>

    <div class="theme-picker">
      <button class="theme-btn active" data-theme="dark" title="Dark"></button>
      <button class="theme-btn" data-theme="satellite" title="Satellite"></button>
      <button class="theme-btn" data-theme="light" title="Light"></button>
      <button class="theme-btn" data-theme="topo" title="Topo"></button>
    </div>

    <div class="map-stats">
      <div class="stat">
        <span class="stat-label">Status</span>
        <span class="stat-value live"><span class="live-dot"></span> Live</span>
      </div>
      <div class="stat">
        <span class="stat-label">Sources</span>
        <span class="stat-value" id="source-count">—</span>
      </div>
      <div class="stat">
        <span class="stat-label">Articles Today</span>
        <span class="stat-value" id="article-count">—</span>
      </div>
      <div class="stat">
        <span class="stat-label">Last Updated</span>
        <span class="stat-value" id="last-updated">—</span>
      </div>
    </div>
  </section>

  <!-- News Panel -->
  <aside class="news-panel">
    <div class="panel-header">
      <div class="panel-title">Latest Headlines</div>
      <div class="tabs">
        <button class="tab active" data-tab="all">All</button>
        <button class="tab" data-tab="politics">Politics</button>
        <button class="tab" data-tab="economy">Economy</button>
        <button class="tab" data-tab="tech">Tech</button>
        <button class="tab" data-tab="sports">Sports</button>
      </div>
      <div class="search-wrap">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input class="search-input" type="text" placeholder="Search headlines..." id="search-input"/>
      </div>
    </div>

    <div class="breaking-banner" id="breaking-banner" style="display:none">
      <span class="breaking-badge"><span class="live-dot"></span> BREAKING</span>
      <span class="breaking-text" id="breaking-text"></span>
    </div>

    <div class="news-feed" id="news-feed">
      <!-- Skeleton loading -->
      <div class="skeleton-item"><div class="skeleton skeleton-bar short"></div><div class="skeleton skeleton-bar w100"></div><div class="skeleton skeleton-bar w80"></div></div>
      <div class="skeleton-item"><div class="skeleton skeleton-bar short"></div><div class="skeleton skeleton-bar w100"></div><div class="skeleton skeleton-bar w60"></div></div>
      <div class="skeleton-item"><div class="skeleton skeleton-bar short"></div><div class="skeleton skeleton-bar w80"></div><div class="skeleton skeleton-bar w100"></div></div>
      <div class="skeleton-item"><div class="skeleton skeleton-bar short"></div><div class="skeleton skeleton-bar w100"></div><div class="skeleton skeleton-bar w60"></div></div>
      <div class="skeleton-item"><div class="skeleton skeleton-bar short"></div><div class="skeleton skeleton-bar w80"></div><div class="skeleton skeleton-bar w100"></div></div>
    </div>
  </aside>
</div>

<script>
const RSS_FEEDS = [
  { name: 'The Star', url: 'https://www.thestar.com.my/rss/News', category: 'politics' },
  { name: 'The Star', url: 'https://www.thestar.com.my/rss/Business', category: 'economy' },
  { name: 'The Star', url: 'https://www.thestar.com.my/rss/Tech', category: 'tech' },
  { name: 'The Star', url: 'https://www.thestar.com.my/rss/Sport', category: 'sports' },
  { name: 'FMT', url: 'https://www.freemalaysiatoday.com/feed/', category: 'politics' },
  { name: 'Malay Mail', url: 'https://www.malaymail.com/feed/rss/malaysia', category: 'politics' },
  { name: 'Malay Mail', url: 'https://www.malaymail.com/feed/rss/sports', category: 'sports' },
];

const RSS2JSON = 'https://api.rss2json.com/v1/api.json?rss_url=';

let allArticles = [];
let activeTab = 'all';

// ── Fetch news ──
async function fetchFeed(feed) {
  try {
    const res = await fetch(RSS2JSON + encodeURIComponent(feed.url));
    const data = await res.json();
    if (data.status !== 'ok') return [];
    return (data.items || []).map(item => ({
      title: decodeHTML(item.title || ''),
      description: decodeHTML(item.description || '').replace(/<[^>]*>/g, '').slice(0, 200),
      link: item.link,
      pubDate: new Date(item.pubDate),
      source: feed.name,
      category: feed.category,
    }));
  } catch {
    return [];
  }
}

function decodeHTML(html) {
  const txt = document.createElement('textarea');
  txt.innerHTML = html;
  return txt.value;
}

async function loadNews() {
  const results = await Promise.all(RSS_FEEDS.map(fetchFeed));
  allArticles = results.flat().sort((a, b) => b.pubDate - a.pubDate);

  // Deduplicate by similar titles
  const seen = new Set();
  allArticles = allArticles.filter(a => {
    const key = a.title.toLowerCase().replace(/[^a-z0-9]/g, '').slice(0, 40);
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });

  updateStats();
  renderNews();
  showBreaking();
}

// ── Render ──
function renderNews() {
  const feed = document.getElementById('news-feed');
  const query = document.getElementById('search-input').value.toLowerCase();

  let items = allArticles;
  if (activeTab !== 'all') items = items.filter(a => a.category === activeTab);
  if (query) items = items.filter(a => a.title.toLowerCase().includes(query) || a.description.toLowerCase().includes(query));

  if (items.length === 0) {
    feed.innerHTML = `
      <div class="empty-state">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V9a2 2 0 012-2h2a2 2 0 012 2v9a2 2 0 01-2 2h-2z"/></svg>
        <p>No articles found</p>
      </div>`;
    return;
  }

  feed.innerHTML = items.slice(0, 50).map(a => `
    <a class="news-item" href="${a.link}" target="_blank" rel="noopener">
      <div class="news-meta">
        <span class="news-source">${a.source}</span>
        <span class="news-dot"></span>
        <span class="news-time">${timeAgo(a.pubDate)}</span>
        <span class="news-category cat-${a.category}">${a.category}</span>
      </div>
      <div class="news-title">${a.title}</div>
      ${a.description ? `<div class="news-desc">${a.description}</div>` : ''}
    </a>
  `).join('');
}

function showBreaking() {
  if (allArticles.length === 0) return;
  const latest = allArticles[0];
  const age = Date.now() - latest.pubDate.getTime();
  // Show as "breaking" if less than 2 hours old
  if (age < 2 * 60 * 60 * 1000) {
    document.getElementById('breaking-banner').style.display = 'flex';
    document.getElementById('breaking-text').textContent = latest.title;
  }
}

function updateStats() {
  const sources = new Set(allArticles.map(a => a.source));
  document.getElementById('source-count').textContent = sources.size;
  document.getElementById('article-count').textContent = allArticles.length;
  document.getElementById('last-updated').textContent = new Date().toLocaleTimeString('en-MY', { hour: '2-digit', minute: '2-digit' });
}

function timeAgo(date) {
  const s = Math.floor((Date.now() - date.getTime()) / 1000);
  if (s < 60) return 'just now';
  if (s < 3600) return Math.floor(s / 60) + 'm ago';
  if (s < 86400) return Math.floor(s / 3600) + 'h ago';
  return Math.floor(s / 86400) + 'd ago';
}

// ── Tabs ──
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    activeTab = tab.dataset.tab;
    renderNews();
  });
});

// ── Search ──
document.getElementById('search-input').addEventListener('input', renderNews);

// ── Leaflet Map ──
const map = L.map('map', {
  center: [4.5, 109],
  zoom: 6,
  zoomControl: false,
  attributionControl: true,
  minZoom: 5,
  maxZoom: 10,
});

// ── Tile Themes ──
const THEMES = {
  dark: {
    url: 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
    attr: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>',
    subdomains: 'abcd',
    maskFill: '#0a0a0f',
    stateFill: 'rgba(59,130,246,0.12)',
    stateStroke: 'rgba(59,130,246,0.4)',
    hoverFill: 'rgba(59,130,246,0.3)',
    hoverStroke: '#3b82f6',
  },
  satellite: {
    url: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
    attr: '&copy; Esri',
    subdomains: null,
    maskFill: '#0a0a0f',
    stateFill: 'rgba(59,130,246,0.08)',
    stateStroke: 'rgba(255,255,255,0.5)',
    hoverFill: 'rgba(59,130,246,0.2)',
    hoverStroke: '#60a5fa',
  },
  light: {
    url: 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
    attr: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>',
    subdomains: 'abcd',
    maskFill: '#0a0a0f',
    stateFill: 'rgba(59,130,246,0.1)',
    stateStroke: 'rgba(59,130,246,0.5)',
    hoverFill: 'rgba(59,130,246,0.25)',
    hoverStroke: '#2563eb',
  },
  topo: {
    url: 'https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png',
    attr: '&copy; <a href="https://opentopomap.org">OpenTopoMap</a>',
    subdomains: 'abc',
    maskFill: '#0a0a0f',
    stateFill: 'rgba(59,130,246,0.08)',
    stateStroke: 'rgba(59,130,246,0.5)',
    hoverFill: 'rgba(59,130,246,0.25)',
    hoverStroke: '#3b82f6',
  },
};

let currentTheme = 'dark';
let tileLayer = null;
let maskLayer = null;
let geojsonLayer = null;
let malaysiaGeoData = null;

function applyTileLayer(themeKey) {
  const t = THEMES[themeKey];
  if (tileLayer) map.removeLayer(tileLayer);
  const opts = { attribution: t.attr, maxZoom: 19 };
  if (t.subdomains) opts.subdomains = t.subdomains;
  tileLayer = L.tileLayer(t.url, opts).addTo(map);
}

applyTileLayer('dark');

// ── Mask: darken everything outside Malaysia ──
function buildMask(geojson, fillColor) {
  // World polygon (huge rectangle)
  const outer = [
    [-90, -180], [-90, 180], [90, 180], [90, -180], [-90, -180]
  ];

  // Extract all polygons from the GeoJSON as holes
  const holes = [];
  const features = geojson.features || [];
  features.forEach(f => {
    const geom = f.geometry;
    if (geom.type === 'Polygon') {
      // Reverse winding for hole
      holes.push(geom.coordinates[0].map(c => [c[1], c[0]]));
    } else if (geom.type === 'MultiPolygon') {
      geom.coordinates.forEach(poly => {
        holes.push(poly[0].map(c => [c[1], c[0]]));
      });
    }
  });

  const latlngs = [outer, ...holes];
  return L.polygon(latlngs, {
    fillColor: fillColor,
    fillOpacity: 1,
    stroke: false,
    interactive: false,
  });
}

function applyMask() {
  if (!malaysiaGeoData) return;
  if (maskLayer) map.removeLayer(maskLayer);
  maskLayer = buildMask(malaysiaGeoData, THEMES[currentTheme].maskFill);
  maskLayer.addTo(map);
  // Ensure mask is below the state borders
  if (geojsonLayer) geojsonLayer.bringToFront();
}

// ── GeoJSON state boundaries ──
const GEOJSON_URL = 'https://raw.githubusercontent.com/dosm-malaysia/data-open/main/datasets/geodata/administrative_1_state.geojson';
const FALLBACK_URL = 'https://raw.githubusercontent.com/Skyjacker/my-states-geojson/master/malaysia.state.geojson';

function getStyles() {
  const t = THEMES[currentTheme];
  return {
    default: { fillColor: t.stateFill, color: t.stateStroke, weight: 1, fillOpacity: 1 },
    hover: { fillColor: t.hoverFill, color: t.hoverStroke, weight: 2, fillOpacity: 1 },
  };
}

function addGeoJSON(data) {
  malaysiaGeoData = data;
  const styles = getStyles();

  geojsonLayer = L.geoJSON(data, {
    style: styles.default,
    onEachFeature(feature, layer) {
      const name = feature.properties.name || feature.properties.Name || feature.properties.state || feature.properties.STATE || '';
      if (name) {
        layer.bindTooltip(name, {
          sticky: true,
          className: 'state-tooltip',
          direction: 'top',
          offset: [0, -8],
        });
      }
      layer.on('mouseover', function () { this.setStyle(styles.hover); });
      layer.on('mouseout', function () { geojsonLayer.resetStyle(this); });
    },
  }).addTo(map);

  applyMask();
}

function refreshGeoJSONStyles() {
  if (!geojsonLayer || !malaysiaGeoData) return;
  map.removeLayer(geojsonLayer);
  addGeoJSON(malaysiaGeoData);
}

fetch(GEOJSON_URL)
  .then(r => { if (!r.ok) throw new Error(); return r.json(); })
  .then(addGeoJSON)
  .catch(() => {
    fetch(FALLBACK_URL)
      .then(r => r.json())
      .then(addGeoJSON)
      .catch(() => {});
  });

// ── Theme Switcher ──
document.querySelectorAll('.theme-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentTheme = btn.dataset.theme;
    applyTileLayer(currentTheme);
    refreshGeoJSONStyles();
  });
});

// ── Init ──
loadNews();
// Refresh every 5 minutes
setInterval(loadNews, 5 * 60 * 1000);
</script>
